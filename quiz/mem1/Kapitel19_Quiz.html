<!DOCTYPE html>
<html lang="da"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Kapitel 19</title>
<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}
</style></head><body><script src="../../assets/path-report.js"></script><script src="../../assets/quiz-result-ceremony.js"></script><div class="wrap">

  <div id="stage"></div></div>
<script>
const QUIZ_POOL = [{"d":"svaer","q":"Trækforholdet i et remdrev er:","o":["F₁/F₂ = e^(μθ)","F₁/F₂ = μθ","F₁/F₂ = μ/θ","F₁−F₂ = μθ"],"a":0,"e":"Capstan-ligningen: eksponentiel i μ og θ. <span class='ref'>[s. 551]</span>"},{"d":"mid","q":"Overført effekt i et remdrev er:","o":["P = (F₁−F₂)·v","P = F₁·F₂","P = (F₁+F₂)/v","P = F₁·v²"],"a":0,"e":"Nettotrækket gange hastigheden. <span class='ref'>[s. 551]</span>"},{"d":"mid","q":"En <b>kilerem</b> giver mere træk end en fladrem fordi:","o":["Kilevirkning øger effektivt μ","Den er tungere","Den er glattere","Den har lavere θ"],"a":0,"e":"V-formen klemmer sig fast → højere friktion. <span class='ref'>[s. 551]</span>"},{"d":"mid","q":"En fordel ved en <b>rem</b> frem for en kæde er:","o":["Den kan glide ved overlast","Fast udveksling","Intet glid","Ingen forspænding nødvendig"],"a":0,"e":"Glid virker som overlastbeskyttelse. <span class='ref'>[s. 551]</span>"},{"d":"mid","q":"En <b>kæde</b> har frem for en rem:","o":["Intet glid","Lavere last","Ingen smøring","Mere støj altid"],"a":0,"e":"Positivt indgreb → nøjagtig udveksling. <span class='ref'>[s. 559]</span>"},{"d":"mid","q":"Trækforholdet F₁/F₂ vokser når:","o":["μ eller θ øges","Hastigheden øges","Remmen bliver kortere","Lasten falder"],"a":0,"e":"e^(μθ) → mere friktion/omslyngning. <span class='ref'>[s. 551]</span>"},{"d":"let","q":"Hvis forspændingen er for lav, vil remmen:","o":["Glide","Knække","Blive stivere","Overføre mere"],"a":0,"e":"For lidt greb → glid og tab. <span class='ref'>[s. 551]</span>"},{"d":"let","q":"Wirer bruges typisk i:","o":["Kraner og elevatorer","Ure","Tandhjulskasser","Lejer"],"a":0,"e":"Store træklaster over afstand. <span class='ref'>[s. 559]</span>"},{"d":"mid","q":"Wirer dimensioneres for træk plus:","o":["Bøjning om skiverne","Vridning alene","Tryk udefra","Temperatur"],"a":0,"e":"Bøjning over remskiver giver ekstra spænding. <span class='ref'>[s. 559]</span>"},{"d":"svaer","q":"F₁−F₂ = 400 N og v = 10 m/s. Overført effekt:","o":["4 kW","40 kW","0,4 kW","400 W"],"a":0,"e":"P = 400·10 = 4000 W = 4 kW. <span class='ref'>[s. 551]</span>"},{"d":"let","q":"En begrænsning ved <b>flade remme</b> er, at de:","o":["Ikke kan sikre absolut synkronisering mellem remskiver","Ikke kan overføre effekt over lange afstande","Kun virker ved meget lave hastigheder","Kræver ingen forspænding"],"a":0,"e":"Flade remme bygger på friktion og har derfor altid en smule slip. <span class='ref'>[s. 548]</span>"},{"d":"let","q":"En <b>synkron-</b> (timing-) rem adskiller sig fra en flad rem ved at have:","o":["Tænder der forhindrer glid","Højere glid end en flad rem","Ingen kontakt med remskiven","Kun brug ved meget lav hastighed"],"a":0,"e":"Timingremme kombinerer den flade rems fordele med tandhjuls/kædes glidfrie kraftoverførsel. <span class='ref'>[s. 551]</span>"},{"d":"mid","q":"Kileremmes 'wedging action' i kilesporet betyder, at de i forhold til flade remme:","o":["Øger normalkraften og dermed trækket ved samme spændkraft","Reducerer normalkraften markant","Har ingen effekt på friktionen","Kun er relevant ved lav hastighed"],"a":0,"e":"Det trapezformede tværsnit giver normalkraften (dN/2)/sinβ i stedet for dN. <span class='ref'>[s. 552]</span>"},{"d":"let","q":"Kileremme (V-belte) opererer typisk med en virkningsgrad på:","o":["90-98%, lavere end flade remme","99,9%, højere end flade remme","Omkring 50%","100%, uden tab"],"a":0,"e":"V-belte har lidt lavere virkningsgrad end flade remme pga. kilevirkningen og bøjningstab. <span class='ref'>[s. 551]</span>"},{"d":"svaer","q":"En 'Lang lay' wire-line har sammenlignet med en 'regular lay':","o":["Bedre modstand mod slid og bøjningsudmattelse, men er mere følsom over for kinkning","Dårligere slidmodstand generelt","Ingen forskel i egenskaber","Kan aldrig kinke eller filtre"],"a":0,"e":"Lang lay har tråde og strenge snoet samme vej — bedre slid/udmattelse, men skal altid sikres i enderne mod oprulning. <span class='ref'>[s. 556]</span>"},{"d":"mid","q":"Kernen (core) i en wire-line har til formål at:","o":["Understøtte trådene elastisk og smøre dem","Bære hele lasten alene","Forhindre al bøjning om skiven","Kun øge den samlede diameter"],"a":0,"e":"Kernen kan være hamp, en polymer eller stålstrenge og beskytter trådene mod for hurtigt slid. <span class='ref'>[s. 555]</span>"},{"d":"mid","q":"For sikker design med lang levetid anbefales forholdet D/d_w (skive-/tråddiameter) for en wire-line at være mindst:","o":["400","40","4000","20"],"a":0,"e":"Under 200 giver ofte permanent deformation af wiren. <span class='ref'>[s. 556]</span>"},{"d":"let","q":"Den mindste anbefalede omslyngningsvinkel for en rullekæde på det mindre kædehjul er:","o":["120°","45°","180°","360°"],"a":0,"e":"Idler-hjul kan bruges til at give en mindre vinkel, hvis pladsen kræver det. <span class='ref'>[s. 559]</span>"},{"d":"svaer","q":"'Chordal rise' i en rullekæde-drift skyldes:","o":["Kædeleddets polygon-bane omkring kædehjulets tænder","Slid på bøsningerne over tid","For lav forspænding i kæden","Termisk udvidelse af pladerne"],"a":0,"e":"Leddet bevæger sig både op og vandret, når det passerer fra én tand til den næste — vigtigt ved høje hastigheder. <span class='ref'>[s. 560]</span>"},{"d":"svaer","q":"Den udmattelsestilladte kraft F_f for en wire-line beregnes som:","o":["S_u·d·D / 2000","S_u/(d·D)","S_u·d/D","2000/(S_u·d·D)"],"a":0,"e":"F_t skal holdes under F_f for lang levetid mod udmattelse. <span class='ref'>[s. 558]</span>"}];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{const p=it.o.map((t,idx)=>({t,c:idx===it.a}));shuffle(p);it.o=p.map(x=>x.t);it.a=p.findIndex(x=>x.c);});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let gr;
  if(ratio>=.85)gr='🏆 Fremragende!';else if(ratio>=.6)gr='👍 Godt gået';else if(ratio>=.35)gr='📚 Ikke dårligt';else gr='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${gr}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
