<!DOCTYPE html>
<html lang="da"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Kapitel 9</title>
<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}
</style></head><body><script src="../../assets/path-report.js"></script><script src="../../assets/quiz-result-ceremony.js"></script><div class="wrap">
  <header><h1>Kapitel 9 --- Søjler</h1><div class="sub">Fundamentals of Machine Elements (Hamrock) · Test dig selv</div></header>
  <div class="hud"><span>Spg. <b id="qnum">1</b>/<span id="qtot">10</span></span>
    <span class="combo">Combo ×<span id="combo">1</span></span>
    <span>Score <b id="score">0</b></span></div>
  <div class="bar"><div id="prog"></div></div>
  <div id="stage"></div></div>
<script>
const QUIZ_POOL = [{"d":"mid","q":"Eulers kritiske knæklast er:","o":["P_cr = π²EI/L_e²","P_cr = EI/L_e","P_cr = π²EI·L_e²","P_cr = EI·L_e²"],"a":0,"e":"P_cr = π²EI/L_e². <span class='ref'>[s. 229]</span>"},{"d":"mid","q":"Knækning er grundlæggende et:","o":["Stabilitetsproblem","Ren styrkeproblem","Udmattelsesproblem","Korrosionsproblem"],"a":0,"e":"Søjlen bliver ustabil før materialet flyder. <span class='ref'>[s. 229]</span>"},{"d":"svaer","q":"Fordobles søjlens længde, bliver knæklasten:","o":["En fjerdedel","Halv","Dobbelt","Uændret"],"a":0,"e":"P_cr ∝ 1/L² → ¼ ved dobbelt længde. <span class='ref'>[s. 229]</span>"},{"d":"mid","q":"Effektiv længde L_e for en søjle leddet i begge ender:","o":["L_e = L","L_e = 2L","L_e = 0,5L","L_e = 0"],"a":0,"e":"Leddet-leddet: L_e = L. <span class='ref'>[s. 231]</span>"},{"d":"svaer","q":"Indspændt-fri søjle (fx flagstang) har:","o":["L_e = 2L","L_e = L","L_e = 0,5L","L_e = 0,7L"],"a":0,"e":"Værste tilfælde: L_e = 2L → lavest knæklast. <span class='ref'>[s. 231]</span>"},{"d":"let","q":"Inertiradius er defineret som:","o":["r = √(I/A)","r = I/A","r = A/I","r = √(A/I)"],"a":0,"e":"r = √(I/A) bruges i slankhedsforholdet. <span class='ref'>[s. 231]</span>"},{"d":"mid","q":"Et højt slankhedsforhold L_e/r betyder svigt ved:","o":["Euler-knækning","Ren flydning","Udmattelse","Korrosion"],"a":0,"e":"Slanke søjler knækker; korte flyder. <span class='ref'>[s. 231]</span>"},{"d":"mid","q":"En søjle bør orienteres så den knækker om aksen med:","o":["Størst I","Mindst I","Størst A","Mindst E"],"a":0,"e":"Størst I → højest P_cr. Faktisk knækker den om mindst I, så gør det størst. <span class='ref'>[s. 229]</span>"},{"d":"let","q":"Johnson-formlen bruges til:","o":["Mellemslanke søjler","Meget slanke søjler","Kun træk","Kun bjælker"],"a":0,"e":"Euler overvurderer for mellemslanke → Johnson. <span class='ref'>[s. 234]</span>"},{"d":"svaer","q":"Knæklasten stiger hvis man:","o":["Øger EI eller mindsker L_e","Øger L_e","Mindsker E","Mindsker I"],"a":0,"e":"P_cr = π²EI/L_e² → stiv og kort søjle. <span class='ref'>[s. 229]</span>"},{"d":"let","q":"Effektiv længde L_e for en søjle med <b>én ende leddet, én ende indspændt</b> er:","o":["L_e = 0,7L","L_e = L","L_e = 0,5L","L_e = 2L"],"a":0,"e":"Tabel 9.1: én ende leddet, én ende indspændt giver L_e = 0,7L. <span class='ref'>[s. 231]</span>"},{"d":"let","q":"Effektiv længde L_e for en søjle med <b>begge ender indspændte</b> er:","o":["L_e = 0,5L","L_e = L","L_e = 0,7L","L_e = 2L"],"a":0,"e":"Begge ender indspændt giver den korteste effektive længde, L_e = 0,5L. <span class='ref'>[s. 231]</span>"},{"d":"mid","q":"Den kritiske Euler-last P_cr afhænger af:","o":["E, I og L_e — ikke materialets styrke S_y","Kun materialets flydestyrke S_y","Kun tværsnittets areal A","Kun søjlens masse"],"a":0,"e":"Euler-lasten er uafhængig af styrken; den afhænger af stivhed (EI) og længde. <span class='ref'>[s. 230]</span>"},{"d":"mid","q":"Den udbøjede form af en Euler-knækket søjle (leddet-leddet) er:","o":["Sinusformet med maksimum midt på søjlen","Lineær (ret linje)","Parabolsk med maksimum ved enderne","Konstant langs hele længden"],"a":0,"e":"y = y_max·sin(πx/l) — nul ved enderne, maksimum ved halv længde. <span class='ref'>[s. 230]</span>"},{"d":"svaer","q":"Hvorfor foretrækkes et <b>hult rør</b> frem for et massivt tværsnit til en søjle?","o":["Materialet placeres længere fra den neutrale akse, hvilket øger I","Det er altid billigere at fremstille","Det giver et lavere E-modul","Det reducerer søjlens masse til nul"],"a":0,"e":"Mere materiale langt fra centrum giver større inertimoment I og dermed højere P_cr ved samme tværsnitsareal. <span class='ref'>[s. 230]</span>"},{"d":"mid","q":"Den kritiske slankhedsratio C_c angiver:","o":["Grænsen mellem Johnson- og Euler-området","Den maksimale tilladte last","Søjlens massefylde","Antallet af integrationskonstanter"],"a":0,"e":"Ved (l_e/r)  ≥ C_c gælder Euler-formlen; derunder skal Johnson-formlen bruges. <span class='ref'>[s. 232]</span>"},{"d":"let","q":"Ved en lille forstyrrelse fra en <b>ustabil ligevægt</b> vil systemet:","o":["Accelerere væk fra ligevægtspositionen","Vende tilbage til ligevægtspositionen","Forblive præcis i den forstyrrede position","Svinge periodisk om ligevægten for evigt"],"a":0,"e":"Ustabil ligevægt: forstyrrelsen forstærkes i stedet for at dæmpes — kendetegnende for søjler i tryk. <span class='ref'>[s. 229]</span>"},{"d":"svaer","q":"Eccentriciteten e for en excentrisk belastet søjle er defineret som:","o":["Afstanden mellem lastens angrebslinje og søjlens centroid-akse","Søjlens totale udbøjning","Forholdet mellem L_e og r","Vinklen mellem last og søjleakse"],"a":0,"e":"En excentrisk last giver et statisk ækvivalent moment M' = -Pe om centroid-aksen. <span class='ref'>[s. 234]</span>"},{"d":"mid","q":"AISC-kriterierne for søjler er primært beregnet til at:","o":["Give et design-framework med indbygget sikkerhedsreduktion, ikke forudsige det faktiske buckling load","Erstatte Euler- og Johnson-formlerne fuldstændigt","Beregne den nøjagtige knæklast for alle materialer","Bestemme materialets flydestyrke"],"a":0,"e":"AISC-ligningerne bruger en sikkerhedsreduktion (n_σ) og er ikke tænkt som en præcis buckling-forudsigelse. <span class='ref'>[s. 234]</span>"},{"d":"let","q":"En søjle (column) defineres som en konstruktionsdel, der er:","o":["Lang og slank i forhold til tværsnittet og udsat for aksial trykbelastning","Kort og tyk, udsat for bøjning","Udsat for ren torsion","Altid fremstillet af støbejern"],"a":0,"e":"Slankheden gør, at søjlen svigter ved lateral udbøjning (buckling) længe før flydning. <span class='ref'>[s. 228]</span>"}];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{const p=it.o.map((t,idx)=>({t,c:idx===it.a}));shuffle(p);it.o=p.map(x=>x.t);it.a=p.findIndex(x=>x.c);});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let gr;
  if(ratio>=.85)gr='🏆 Fremragende!';else if(ratio>=.6)gr='👍 Godt gået';else if(ratio>=.35)gr='📚 Ikke dårligt';else gr='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${gr}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
