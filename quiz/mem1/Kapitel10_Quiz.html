<!DOCTYPE html>
<html lang="da"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Kapitel 10</title>
<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}
</style></head><body><script src="../../assets/path-report.js"></script><script src="../../assets/quiz-result-ceremony.js"></script><div class="wrap">
  <header><h1>Kapitel 10 --- Spændinger og Deformationer i Cylindre</h1><div class="sub">Fundamentals of Machine Elements (Hamrock) · Test dig selv</div></header>
  <div class="hud"><span>Spg. <b id="qnum">1</b>/<span id="qtot">10</span></span>
    <span class="combo">Combo ×<span id="combo">1</span></span>
    <span>Score <b id="score">0</b></span></div>
  <div class="bar"><div id="prog"></div></div>
  <div id="stage"></div></div>
<script>
const QUIZ_POOL = [{"d":"mid","q":"Hoop-spændingen i en tyndvægget trykbeholder er:","o":["σ_θ = pr/t","σ_θ = pr/2t","σ_θ = 2pr/t","σ_θ = p/rt"],"a":0,"e":"σ_θ = pr/t (tangential). <span class='ref'>[s. 245]</span>"},{"d":"mid","q":"Forholdet mellem hoop- og aksialspænding er:","o":["Hoop = 2 × aksial","Hoop = aksial","Hoop = ½ aksial","Hoop = 4 × aksial"],"a":0,"e":"σ_θ = pr/t, σ_a = pr/2t → faktor 2. <span class='ref'>[s. 245]</span>"},{"d":"mid","q":"En trykbeholder revner typisk:","o":["På langs","På tværs","I bunden","Tilfældigt"],"a":0,"e":"Hoop er størst → revne langs cylinderen. <span class='ref'>[s. 245]</span>"},{"d":"svaer","q":"Til en <b>tykvægget</b> cylinder bruges:","o":["Lamés ligninger","σ = pr/t","Eulers formel","Goodman"],"a":0,"e":"Tykvæg → spænding varierer gennem væggen (Lamé). <span class='ref'>[s. 250]</span>"},{"d":"mid","q":"I en tykvægget cylinder er tangentialspændingen størst:","o":["På inderfladen","På yderfladen","I midten","Konstant"],"a":0,"e":"Maks. hoop på indersiden. <span class='ref'>[s. 250]</span>"},{"d":"let","q":"En <b>presforbindelse</b> overfører moment via:","o":["Kontakttryk fra overmål","En kile","Svejsning","Lim"],"a":0,"e":"Interference → kontakttryk → friktionsmoment. <span class='ref'>[s. 254]</span>"},{"d":"svaer","q":"Fordobles vægtykkelsen t, bliver hoop-spændingen:","o":["Ca. halveret","Fordoblet","Uændret","Firdoblet"],"a":0,"e":"σ_θ = pr/t → ∝ 1/t. <span class='ref'>[s. 245]</span>"},{"d":"let","q":"Aksialspændingen i en trykbeholder er:","o":["σ_a = pr/2t","σ_a = pr/t","σ_a = 2pr/t","σ_a = 0"],"a":0,"e":"Halvdelen af hoop-spændingen. <span class='ref'>[s. 245]</span>"},{"d":"mid","q":"En hurtigt roterende skive får ekstra spænding fra:","o":["Centrifugalkraft","Tyngdekraft alene","Tryk udefra","Temperatur"],"a":0,"e":"Rotation → centrifugal belastning. <span class='ref'>[s. 254]</span>"},{"d":"svaer","q":"p=2 MPa, r=500 mm, t=10 mm. Hoop-spænding:","o":["100 MPa","50 MPa","10 MPa","200 MPa"],"a":0,"e":"σ_θ = pr/t = 2·500/10 = 100 MPa. <span class='ref'>[s. 245]</span>"},{"d":"let","q":"En cylinder betragtes som <b>tyndvægget</b>, når:","o":["d_i/t_h > 40","d_i/t_h < 40","d_i/t_h = 1","t_h > d_i"],"a":0,"e":"Er den indre diameter mere end 40× vægtykkelsen, bruges tyndvægsteori. <span class='ref'>[s. 245]</span>"},{"d":"mid","q":"I tyndvægget trykbeholder-teori antages den radiale spænding σ_r at være:","o":["Tilnærmet nul (meget mindre end hoop/aksial)","Lig hoop-spændingen","Den største af de tre hovedspændinger","Negativ og dominerende"],"a":0,"e":"σ_r = p, men p er typisk meget mindre end σ_θ og σ_a, så σ_r ≈ 0 er en rimelig tilnærmelse. <span class='ref'>[s. 246]</span>"},{"d":"mid","q":"I en internt trykbelastet tykvægget cylinder optræder den maksimale radiale spænding:","o":["Ved r = r_i, hvor σ_r,max = -p_i","Ved r = r_o","Midt i vægtykkelsen","Den er altid nul"],"a":0,"e":"Radial spænding er en trykspænding og numerisk størst ved den indre radius, lig -p_i. <span class='ref'>[s. 249]</span>"},{"d":"svaer","q":"For en <b>ydre</b> trykbelastet tykvægget cylinder (p_i = 0) er σ_r og σ_θ:","o":["Begge trykspændinger (negative)","Begge trækspændinger","σ_r trækspænding, σ_θ trykspænding","Altid nul"],"a":0,"e":"Ved ydre tryk er både radial- og tangentialspænding kompressive gennem hele væggen. <span class='ref'>[s. 249]</span>"},{"d":"let","q":"Ved en <b>krympeforbindelse</b> (shrink fit) fremstilles samlingen ved at:","o":["Opvarme navet, så det udvider sig og kan skydes på plads, og derefter afkøle det","Presse navet på med en hydraulisk presse ved stuetemperatur","Svejse nav og aksel sammen","Køle akslen for at krympe den"],"a":0,"e":"Navet opvarmes ud over interferencen, monteres, og afkøling skaber kontakttrykket. <span class='ref'>[s. 254]</span>"},{"d":"mid","q":"Momentet, en presforbindelse kan overføre, er givet ved:","o":["T = 2πμr_f²lp_f","T = πr_f²p_f","T = μp_f/A","T = p_f·l"],"a":0,"e":"T = P_max·r_f = 2πμr_f²lp_f — afhænger af friktion, radius, længde og fittryk. <span class='ref'>[s. 253]</span>"},{"d":"mid","q":"Interferens (δ) mellem to mødende dele defineres som:","o":["Den faktiske størrelsesforskel, når delene overlapper","Det målbare mellemrum mellem delene","Halvdelen af tolerancen","Forskellen i materialets E-modul"],"a":0,"e":"Interferens er den 'negative allowance' — delene overlapper, før de monteres. <span class='ref'>[s. 244]</span>"},{"d":"svaer","q":"I en roterende, massiv (ikke-hullet) cylinder uden tryk optræder den maksimale spænding:","o":["I centrum (r = 0), hvor σ_θ,max = σ_r,max","Ved den ydre radius","Midt mellem centrum og periferi","Kun i overfladen"],"a":0,"e":"For massive roterende cylindre er σ_θ og σ_r ens og størst i centrum. <span class='ref'>[s. 251]</span>"},{"d":"let","q":"Temperaturstigningen Δt_m, der kræves for at samle en krympeforbindelse, afhænger af:","o":["Interferencen δ_r og materialets udvidelseskoefficient β","Kun akslens diameter","Omgivelsestemperaturen alene","Materialets flydestyrke S_y"],"a":0,"e":"Δt_m = δ_r/(β·r_f) — mere interferens eller lavere β kræver højere opvarmning. <span class='ref'>[s. 254]</span>"},{"d":"svaer","q":"I en roterende cylinder <b>med et centralt hul</b> (uden tryk) er den maksimale tangentialspænding:","o":["Størst ved den indre radius r_i, og altid større end den radiale spænding","Størst ved den ydre radius r_o","Konstant gennem hele væggen","Altid nul pga. hullet"],"a":0,"e":"σ_θ har sit maksimum ved r_i og overstiger σ_r for alle radier. <span class='ref'>[s. 251]</span>"}];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{const p=it.o.map((t,idx)=>({t,c:idx===it.a}));shuffle(p);it.o=p.map(x=>x.t);it.a=p.findIndex(x=>x.c);});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let gr;
  if(ratio>=.85)gr='🏆 Fremragende!';else if(ratio>=.6)gr='👍 Godt gået';else if(ratio>=.35)gr='📚 Ikke dårligt';else gr='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${gr}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
