<!DOCTYPE html>
<html lang="da"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Kapitel 15</title>
<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}
</style></head><body><script src="../../assets/path-report.js"></script><script src="../../assets/quiz-result-ceremony.js"></script><div class="wrap">
  <header><h1>Kapitel 15 --- Skrå-, Kegle- og Snekketandhjul</h1><div class="sub">Fundamentals of Machine Elements (Hamrock) · Test dig selv</div></header>
  <div class="hud"><span>Spg. <b id="qnum">1</b>/<span id="qtot">10</span></span>
    <span class="combo">Combo ×<span id="combo">1</span></span>
    <span>Score <b id="score">0</b></span></div>
  <div class="bar"><div id="prog"></div></div>
  <div id="stage"></div></div>
<script>
const QUIZ_POOL = [{"d":"mid","q":"Skråtandhjul giver sammenlignet med ligetandede:","o":["Jævnere og mere støjsvag drift","Højere støj","Ingen aksialkraft","Lavere udveksling altid"],"a":0,"e":"Overlappende tandindgreb → blødere drift. <span class='ref'>[s. 427]</span>"},{"d":"mid","q":"Ulempen ved skråtandhjul er:","o":["De giver en aksialkraft","De er svagere","De støjer mere","De kan ikke gribe ind"],"a":0,"e":"Skrå tænder → aksial thrust som lejerne skal bære. <span class='ref'>[s. 427]</span>"},{"d":"mid","q":"<b>Keglehjul</b> bruges til aksler der:","o":["Krydser hinanden","Er parallelle","Er koaksiale","Ikke roterer"],"a":0,"e":"Bevel gears overfører mellem krydsende aksler. <span class='ref'>[s. 421]</span>"},{"d":"mid","q":"<b>Snekkedrev</b> giver:","o":["Meget stor udveksling i ét trin","Lille udveksling","Ingen udveksling","Kun 1:1"],"a":0,"e":"Én snekkegang mod mange hjultænder → høj i. <span class='ref'>[s. 436]</span>"},{"d":"svaer","q":"<b>Selvspærring</b> i et snekkedrev betyder:","o":["Hjulet kan ikke drive snekken tilbage","Snekken kan ikke dreje hjulet","Begge står stille","Fri gennemgang begge veje"],"a":0,"e":"Lav stigningsvinkel → virker som bremse. <span class='ref'>[s. 436]</span>"},{"d":"mid","q":"Snekkedrev har typisk:","o":["Lav virkningsgrad","100% virkningsgrad","Ingen glidning","Meget lav udveksling"],"a":0,"e":"Stor glidning → energitab til varme. <span class='ref'>[s. 436]</span>"},{"d":"let","q":"Skråvinklen ψ styrer:","o":["Hvor blødt tænderne griber ind","Modulet","Materialet","Vægten"],"a":0,"e":"Større ψ → mere overlap, blødere gang (men mere aksialkraft). <span class='ref'>[s. 427]</span>"},{"d":"let","q":"Til en 90°-vinkeldrivning vælges:","o":["Keglehjul","Ligetandede hjul","Fladrem","Kæde"],"a":0,"e":"Keglehjul håndterer krydsende aksler. <span class='ref'>[s. 421]</span>"},{"d":"mid","q":"En fordel ved snekkedrevets selvspærring er:","o":["Det virker som en bremse","Højere virkningsgrad","Lavere udveksling","Ingen slid"],"a":0,"e":"Lasten kan ikke drive systemet baglæns. <span class='ref'>[s. 436]</span>"},{"d":"svaer","q":"Aksialkraften fra skråtandhjul skal optages af:","o":["Lejerne","Kilen","Smøremidlet","Tandnoden"],"a":0,"e":"Lejerne bærer den aksiale thrust. <span class='ref'>[s. 427]</span>"},{"d":"mid","q":"Aksialkraften W_a i et skråtandhjul (W_a = W_t·tanψ) stiger med:","o":["Stigende skrå-vinkel ψ","Faldende modul","Aftagende transmitteret last","Den er uafhængig af ψ"],"a":0,"e":"Jo større skrå-vinkel, jo større bliver den aksiale kraft, lejerne skal optage. <span class='ref'>[s. 424]</span>"},{"d":"let","q":"Sammenlignet med et spurgear af samme størrelse har et skråtandhjul typisk:","o":["Højere indgrebsforhold og dermed større bæreevne","Lavere indgrebsforhold og mindre bæreevne","Nøjagtig samme indgrebsforhold som spurgear","Ingen tandoverlap overhovedet"],"a":0,"e":"Det aksiale tandoverlap øger indgrebsforholdet, hvilket giver højere bæreevne end et tilsvarende spurgear. <span class='ref'>[s. 422]</span>"},{"d":"mid","q":"Det ækvivalente tandtal N_n for skråtandhjul (bruges ved tværsnitsanalyse) beregnes som:","o":["N_n = N/cos³ψ","N_n = N·cosψ","N_n = N/cosψ","N_n = N·cos³ψ"],"a":0,"e":"Tværsnittet vinkelret på rotationsaksen svarer til et spurgear med et større, ækvivalent tandtal. <span class='ref'>[s. 423]</span>"},{"d":"svaer","q":"Virkningsgraden for et snekkedrev kan typisk ligge:","o":["Fra så lavt som 50% til så højt som 90%","Altid over 95%","Altid under 30%","Konstant 75% uanset design"],"a":0,"e":"Snekkedrev spænder bredt i virkningsgrad afhængig af stigningsvinkel og glidning. <span class='ref'>[s. 423]</span>"},{"d":"mid","q":"En vigtig kinematisk begrænsning for snekkedrev er, at:","o":["Snekken skal drive hjulet — hjulet kan ikke drive snekken","Hjulet altid skal drive snekken","De kan drive hinanden i begge retninger uden forskel","Der ikke findes nogen retningsbegrænsning"],"a":0,"e":"Snekken må drive hjulet; det omvendte forhindres normalt af friktion/selvspærring. <span class='ref'>[s. 423]</span>"},{"d":"let","q":"Keglehjulstænder (bevel gears) laves oftest med en trykvinkel på:","o":["14,5°, 17,5° eller 20° (20° mest populær)","45° eller derover","0°, da keglehjul ikke har trykvinkel","90°"],"a":0,"e":"Standard trykvinkler for rette keglehjul, med 20° som den mest almindelige. <span class='ref'>[s. 427]</span>"},{"d":"mid","q":"Sammenlignet med rette keglehjul (straight bevel) har spiral-keglehjul:","o":["Mere tandoverlap og jævnere drift, men større thrust-kraft","Mindre tandoverlap og mere støj","Ingen thrust-kraft overhovedet","Lavere pris og enklere fremstilling"],"a":0,"e":"Spiralvinklen giver bedre overlap og højhastighedsegnethed, men også større aksialkraft. <span class='ref'>[s. 427]</span>"},{"d":"svaer","q":"Hypoid-tandhjul adskiller sig fra almindelige keglehjul ved, at:","o":["Pinion- og hjulakslerne ikke skærer hinanden (der er en offset-afstand)","De kun kan bruges til parallelle aksler","Pinion og hjul altid har samme modul","De aldrig kan overføre moment ved 90°"],"a":0,"e":"Hypoid-gearets akser passerer forbi hinanden med en offset, i modsætning til keglehjul hvor akserne skærer. <span class='ref'>[s. 428]</span>"},{"d":"let","q":"Zerol-keglehjul har tænder der:","o":["Er krumme i længderetningen, men med en spiralvinkel på nul","Er helt lige som ved rette keglehjul","Har en meget stor spiralvinkel","Kun findes på snekkedrev"],"a":0,"e":"Zerol-gear ligner rette keglehjul i spiralvinkel (nul), men har krum tandform som spiral-keglehjul. <span class='ref'>[s. 427]</span>"},{"d":"mid","q":"Det virtuelle tandtal N_v for et keglehjul beregnes som:","o":["N_v = N/cos(α_p), hvor α_p er delekeglevinklen","N_v = N·cos(α_p)","N_v = N/sin(α_p)","N_v = N·α_p"],"a":0,"e":"Det virtuelle tandtal bruges til at sammenligne keglehjulets tandprofil med et ækvivalent spurgear. <span class='ref'>[s. 427]</span>"}];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{const p=it.o.map((t,idx)=>({t,c:idx===it.a}));shuffle(p);it.o=p.map(x=>x.t);it.a=p.findIndex(x=>x.c);});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let gr;
  if(ratio>=.85)gr='🏆 Fremragende!';else if(ratio>=.6)gr='👍 Godt gået';else if(ratio>=.35)gr='📚 Ikke dårligt';else gr='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${gr}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
