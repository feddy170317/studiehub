<!DOCTYPE html>
<html lang="da"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Kapitel 4</title>
<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}
</style></head><body><script src="../../assets/path-report.js"></script><script src="../../assets/quiz-result-ceremony.js"></script><div class="wrap">
  <header><h1>Kapitel 4 --- Spændinger og Tøjninger</h1><div class="sub">Fundamentals of Machine Elements (Hamrock) · Test dig selv</div></header>
  <div class="hud"><span>Spg. <b id="qnum">1</b>/<span id="qtot">10</span></span>
    <span class="combo">Combo ×<span id="combo">1</span></span>
    <span>Score <b id="score">0</b></span></div>
  <div class="bar"><div id="prog"></div></div>
  <div id="stage"></div></div>
<script>
const QUIZ_POOL = [{"d":"mid","q":"Hovedspændinger er de spændinger hvor:","o":["Forskydningsspændingen er nul","Normalspændingen er nul","Tøjningen er nul","Arealet er størst"],"a":0,"e":"På hovedplanerne er τ=0 og σ ekstrem. <span class='ref'>[s. 94]</span>"},{"d":"svaer","q":"Maksimal forskydningsspænding udtrykt ved hovedspændinger:","o":["τ_max = (σ₁−σ₂)/2","τ_max = σ₁−σ₂","τ_max = (σ₁+σ₂)/2","τ_max = σ₁·σ₂"],"a":0,"e":"τ_max = (σ₁−σ₂)/2 = cirklens radius. <span class='ref'>[s. 96]</span>"},{"d":"mid","q":"<b>Mohrs cirkel</b> bruges til at:","o":["Transformere spændinger grafisk","Måle hårdhed","Beregne vægt","Vælge materiale"],"a":0,"e":"Cirklen giver spændinger i vilkårlige snit. <span class='ref'>[s. 99]</span>"},{"d":"mid","q":"Centrum for Mohrs cirkel ligger ved:","o":["(σ_x+σ_y)/2 på σ-aksen","τ_xy på τ-aksen","Origo altid","σ_x på σ-aksen"],"a":0,"e":"Centrum = middelnormalspændingen (σ_x+σ_y)/2. <span class='ref'>[s. 99]</span>"},{"d":"let","q":"Radius i Mohrs cirkel svarer til:","o":["τ_max","σ₁","Middelspændingen","Nul"],"a":0,"e":"Radius = maksimal forskydningsspænding. <span class='ref'>[s. 99]</span>"},{"d":"svaer","q":"Hovedspændingerne findes ved formlen:","o":["Middel ± √((Δσ/2)²+τ_xy²)","Middel × τ_xy","σ_x − σ_y","τ_xy/2"],"a":0,"e":"σ_{1,2} = (σx+σy)/2 ± √(((σx−σy)/2)²+τxy²). <span class='ref'>[s. 94]</span>"},{"d":"mid","q":"Hovedspændinger bruges videre til:","o":["Brudkriterier","Vægtberegning","Farvevalg","Temperaturmåling"],"a":0,"e":"σ₁, σ₂ indgår i flyde-/brudkriterier (kap. 6). <span class='ref'>[s. 94]</span>"},{"d":"let","q":"Poissons forhold ν kobler:","o":["Tøjning på tværs til tøjning på langs","Kraft til moment","Spænding til temperatur","Vægt til volumen"],"a":0,"e":"ν = −tværtøjning/længdetøjning. <span class='ref'>[s. 104]</span>"},{"d":"mid","q":"På hovedplanerne er forskydningsspændingen:","o":["Nul","Maksimal","Lig σ₁","Uendelig"],"a":0,"e":"Definitionen på hovedspændinger: τ=0. <span class='ref'>[s. 94]</span>"},{"d":"svaer","q":"Ved ren forskydning τ er hovedspændingerne:","o":["+τ og −τ","τ og 0","2τ og τ","0 og 0"],"a":0,"e":"Ren forskydning giver σ₁=+τ, σ₂=−τ (45°). <span class='ref'>[s. 99]</span>"},{"d":"let","q":"Hvor mange uafhængige spændingskomponenter kræves for at beskrive en generel 3D-spændingstilstand?","o":["Seks (tre normal- og tre forskydningsspændinger)","Ni","Tre","Ét"],"a":0,"e":"Spændingstensoren har ni komponenter, men momentligevægt gør forskydningsspændingerne symmetriske, så kun seks er uafhængige. <span class='ref'>[s. 35]</span>"},{"d":"let","q":"Hvor mange af de tre hovedspændinger er altid nul i en plan (biaksial) spændingstilstand?","o":["Én","Ingen","To","Alle tre"],"a":0,"e":"I plan spænding er én af de tre hovedspændinger altid nul, fordi der ikke er nogen belastning i tredje retning. <span class='ref'>[s. 36]</span>"},{"d":"let","q":"En forskydningstøjning γ_xy regnes som <b>positiv</b>, når:","o":["Den indre vinkel i spændingselementet bliver mindre end 90°","Den indre vinkel bliver større end 90°","Elementet roterer stift uden formændring","Elementets volumen øges"],"a":0,"e":"Fortegnskonventionen for skærtøjning knytter sig til, om den oprindeligt rette vinkel formindskes. <span class='ref'>[s. 43]</span>"},{"d":"mid","q":"Hovedspændingerne ordnes konventionelt sådan at:","o":["σ₁ ≥ σ₂ ≥ σ₃","σ₁ ≤ σ₂ ≤ σ₃","σ₁ = σ₂ = σ₃ altid","Rækkefølgen er vilkårlig fra sag til sag"],"a":0,"e":"Denne konvention bruges konsekvent til at identificere σ₁ som den største og σ₃ som den mindste hovedspænding. <span class='ref'>[s. 36]</span>"},{"d":"mid","q":"Vinklen mellem planet for maksimal forskydningsspænding og planet for hovedspændingerne er:","o":["45°","90°","0°","30°"],"a":0,"e":"|φ_τ − φ_σ| = π/4, altså 45° mellem de to orienteringer. <span class='ref'>[s. 37]</span>"},{"d":"mid","q":"Hvad kendetegner den <b>oktaedriske normalspænding</b> σ_oct fysisk?","o":["Den komprimerer/udvider oktahedronet uden at forvride det","Den forvrider oktahedronet uden at ændre volumen","Den er altid lig nul","Den findes kun i rene 2D-tilfælde"],"a":0,"e":"Normalspændingen virker ens på alle otte oktaedriske planer og ændrer kun volumen, ikke formen. <span class='ref'>[s. 40]</span>"},{"d":"mid","q":"Ved <b>plan tøjning</b> (plane strain) sættes hvilke tøjningskomponenter til nul?","o":["ε_z, γ_xz og γ_yz","ε_x og ε_y","γ_xy","Alle normaltøjninger"],"a":0,"e":"Kun ε_x, ε_y og γ_xy indgår i en plan tøjningstilstand. <span class='ref'>[s. 42]</span>"},{"d":"svaer","q":"Den normale oktaedriske spænding σ_oct beregnes ud fra hovedspændingerne som:","o":["(σ₁+σ₂+σ₃)/3","(σ₁+σ₂+σ₃)/2","σ₁·σ₂·σ₃","(σ₁−σ₂−σ₃)/3"],"a":0,"e":"σ_oct er gennemsnittet af de tre hovedspændinger. <span class='ref'>[s. 41]</span>"},{"d":"svaer","q":"Hvor mange målinger fra en 0°–45°–90° strain gage-rosette er nødvendige for at bestemme ε_x, ε_y og γ_xy?","o":["Tre (én i hver af de tre retninger)","Én","To","Seks"],"a":0,"e":"De tre ukendte tøjninger kræver tre målte tøjninger i tre forskellige retninger for at give et løsbart ligningssystem. <span class='ref'>[s. 44]</span>"},{"d":"svaer","q":"For en fuld 3D (triaksial) spændingstilstand findes de tre hovedspændinger ved at:","o":["Løse en tredjegradsligning (kubisk ligning)","Løse et lineært 2-ligningssystem","Aflæse dem direkte fra Mohrs cirkel uden beregning","Tage kvadratroden af normalspændingen"],"a":0,"e":"I 3D er hovedspændingerne de tre rødder i en kubisk ligning — mere komplekst end den lukkede formel i 2D. <span class='ref'>[s. 39]</span>"}];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{const p=it.o.map((t,idx)=>({t,c:idx===it.a}));shuffle(p);it.o=p.map(x=>x.t);it.a=p.findIndex(x=>x.c);});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let gr;
  if(ratio>=.85)gr='🏆 Fremragende!';else if(ratio>=.6)gr='👍 Godt gået';else if(ratio>=.35)gr='📚 Ikke dårligt';else gr='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${gr}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
