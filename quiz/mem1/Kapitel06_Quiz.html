<!DOCTYPE html>
<html lang="da"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Kapitel 6</title>
<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}
</style></head><body><script src="../../assets/path-report.js"></script><script src="../../assets/quiz-result-ceremony.js"></script><div class="wrap">
  <header><h1>Kapitel 6 --- Brudforudsigelse ved Statisk Belastning</h1><div class="sub">Fundamentals of Machine Elements (Hamrock) · Test dig selv</div></header>
  <div class="hud"><span>Spg. <b id="qnum">1</b>/<span id="qtot">10</span></span>
    <span class="combo">Combo ×<span id="combo">1</span></span>
    <span>Score <b id="score">0</b></span></div>
  <div class="bar"><div id="prog"></div></div>
  <div id="stage"></div></div>
<script>
const QUIZ_POOL = [{"d":"mid","q":"Hvilket kriterium anbefales til <b>sejt</b> materiale?","o":["von Mises","Maksimal normalspænding","Mohr-Coulomb","Hookes lov"],"a":0,"e":"von Mises passer bedst til flydning i sejle metaller. <span class='ref'>[s. 140]</span>"},{"d":"mid","q":"von Mises-flydning indtræffer når:","o":["σ_e = S_y","σ_e = 0","σ_e = E","σ_e = S_u/2"],"a":0,"e":"Flydning når den ækvivalente spænding når flydegrænsen. <span class='ref'>[s. 140]</span>"},{"d":"svaer","q":"Tresca-kriteriet (maks. forskydning) bruger:","o":["σ₁ − σ₃ = S_y/n_s","σ₁ + σ₃","σ₁·σ₃","σ₁/σ₃"],"a":0,"e":"Tresca: differensen af største og mindste hovedspænding. <span class='ref'>[s. 140]</span>"},{"d":"mid","q":"Til <b>sprødt</b> materiale bruges:","o":["Maksimal normalspænding","von Mises","Distortionsenergi","Tresca"],"a":0,"e":"Sprøde materialer svigter ved max normalspænding (σ₁=S_u). <span class='ref'>[s. 150]</span>"},{"d":"mid","q":"Tresca er sammenlignet med von Mises:","o":["Mere konservativ","Mindre konservativ","Identisk altid","Ugyldig"],"a":0,"e":"Tresca ligger på den sikre side (lidt lavere tilladelig last). <span class='ref'>[s. 140]</span>"},{"d":"let","q":"Et brudkriterium oversætter:","o":["Sammensat spænding til én ækvivalent","Kraft til moment","Vægt til styrke","Tøjning til temperatur"],"a":0,"e":"Så den kan sammenlignes med materialets S_y. <span class='ref'>[s. 134]</span>"},{"d":"svaer","q":"Ved enakset træk σ giver von Mises σ_e =:","o":["σ","2σ","σ/2","0"],"a":0,"e":"Ved enakset tilstand reducerer von Mises til σ_e = σ. <span class='ref'>[s. 140]</span>"},{"d":"let","q":"Sprøde materialer svigter typisk:","o":["Uden varsel","Efter stor flydning","Kun ved træk","Aldrig"],"a":0,"e":"Ringe plastisk deformation → pludseligt brud → vælg højere n_s. <span class='ref'>[s. 150]</span>"},{"d":"mid","q":"Formålet med σ_e (ækvivalent spænding) er at:","o":["Sammenligne med S_y","Måle vægten","Finde E","Beregne temperatur"],"a":0,"e":"σ_e sammenlignes direkte med materialets styrke. <span class='ref'>[s. 140]</span>"},{"d":"svaer","q":"Hvis σ_e = 250 MPa og S_y = 500 MPa, er n_s:","o":["2","0,5","250","750"],"a":0,"e":"n_s = S_y/σ_e = 500/250 = 2. <span class='ref'>[s. 140]</span>"},{"d":"let","q":"Spændingskoncentrationsfaktoren K_c defineres som:","o":["K_c = σ_max/σ_nom","K_c = σ_nom/σ_max","K_c = σ_max·σ_nom","K_c = σ_max − σ_nom"],"a":0,"e":"K_c relaterer den faktiske maksimale spænding ved en diskontinuitet til den nominelle (gennemsnitlige) spænding. <span class='ref'>[s. 134]</span>"},{"d":"mid","q":"Spændingskoncentrationsfaktoren K_c er:","o":["Uafhængig af materialeegenskaber, kun bestemt af geometri","Kun gyldig for sprøde materialer","Proportional med elasticitetsmodulet","Uafhængig af geometri"],"a":0,"e":"K_c afhænger udelukkende af diskontinuitetens type og geometri (hul, fillet, not), ikke af materialet. <span class='ref'>[s. 136]</span>"},{"d":"mid","q":"Spændingsintensitetsfaktoren ved en revnespids beregnes som:","o":["K_i = Yσ√(πa)","K_i = Yσ/√(πa)","K_i = Y/(σ√a)","K_i = Yσ·πa"],"a":0,"e":"Y er en geometri-korrektionsfaktor, σ nominel spænding, a den halve revnelængde. <span class='ref'>[s. 141]</span>"},{"d":"let","q":"Den hyppigst forekommende revne-vækst-mode i praksis er:","o":["Mode I (åbning)","Mode II (glidning)","Mode III (rivning)","Mode IV (torsion)"],"a":0,"e":"Mode I, hvor revneflankerne adskilles symmetrisk om revneplanet, er den letteste at visualisere og mest almindelige. <span class='ref'>[s. 141]</span>"},{"d":"mid","q":"Brudsejhed K_Ic bruges som designkriterium til at forhindre:","o":["Sprødt brud, analogt til hvordan S_y bruges for duktil flydning","Krybning ved høj temperatur","Korrosion","Termisk udvidelse"],"a":0,"e":"Når spændingsintensiteten K_i når materialets K_Ic, sker brud. <span class='ref'>[s. 142]</span>"},{"d":"svaer","q":"Sikkerhedsfaktoren n_s i en ensakset spændingstilstand udtrykkes som:","o":["n_s = σ_all/σ_d","n_s = σ_d/σ_all","n_s = σ_all·σ_d","n_s = σ_all − σ_d"],"a":0,"e":"n_s er forholdet mellem den tilladelige spænding og designspændingen; n_s < 1 kræver redesign. <span class='ref'>[s. 143]</span>"},{"d":"let","q":"MSST (maximum-shear-stress theory) er også kendt som:","o":["Tresca-kriteriet","von Mises-kriteriet","Mohr-Coulomb-kriteriet","Griffith-kriteriet"],"a":0,"e":"MSST blev først foreslået af Coulomb (1773) og siden uafhængigt af Tresca (1868), deraf navnet. <span class='ref'>[s. 144]</span>"},{"d":"mid","q":"DET (distortion-energy theory) er også kendt som:","o":["von Mises-kriteriet","Tresca-kriteriet","Griffith-kriteriet","Mohr-kriteriet"],"a":0,"e":"DET og von Mises-kriteriet er samme teori — den anbefalede metode for duktile materialer. <span class='ref'>[s. 144]</span>"},{"d":"svaer","q":"En <b>yield locus</b> (flydekurve) beskriver:","o":["Alle kombinationer af hovedspændinger, der netop giver flydning","Kun ét bestemt spændingspunkt","Materialets massefylde ved forskellige temperaturer","Revnens væksthastighed over tid"],"a":0,"e":"Spændingstilstande inden for kurven giver elastisk deformation; uden for kurven kan materialet ikke bære lasten. <span class='ref'>[s. 144]</span>"},{"d":"let","q":"Hvis fillet-radius r ved et tværsnitsspring i en akseldel reduceres, vil K_c typisk:","o":["Stige","Falde","Forblive uændret","Blive negativ"],"a":0,"e":"Mindre radius giver skarpere overgang og dermed højere spændingskoncentration. <span class='ref'>[s. 135]</span>"}];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{const p=it.o.map((t,idx)=>({t,c:idx===it.a}));shuffle(p);it.o=p.map(x=>x.t);it.a=p.findIndex(x=>x.c);});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let gr;
  if(ratio>=.85)gr='🏆 Fremragende!';else if(ratio>=.6)gr='👍 Godt gået';else if(ratio>=.35)gr='📚 Ikke dårligt';else gr='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${gr}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
