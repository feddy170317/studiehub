<!DOCTYPE html>
<html lang="da"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Kapitel 12</title>
<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}
</style></head><body><script src="../../assets/path-report.js"></script><script src="../../assets/quiz-result-ceremony.js"></script><div class="wrap">
  <header><h1>Kapitel 12 --- Hydrodynamiske og Hydrostatiske Lejer</h1><div class="sub">Fundamentals of Machine Elements (Hamrock) · Test dig selv</div></header>
  <div class="hud"><span>Spg. <b id="qnum">1</b>/<span id="qtot">10</span></span>
    <span class="combo">Combo ×<span id="combo">1</span></span>
    <span>Score <b id="score">0</b></span></div>
  <div class="bar"><div id="prog"></div></div>
  <div id="stage"></div></div>
<script>
const QUIZ_POOL = [{"d":"mid","q":"Et <b>hydrodynamisk</b> lejer bærer akslen på:","o":["En selvopbygget oliefilm","Metal-metal-kontakt","Kuglelejer","Luft"],"a":0,"e":"Rotationen bygger selv trykfilmen op. <span class='ref'>[s. 303]</span>"},{"d":"svaer","q":"Sommerfeld-tallet er:","o":["S = (r/c)²·ηN/P","S = ηN·P","S = c/r","S = P/(ηN)"],"a":0,"e":"S = (r/c)² ηN/P — dimensionsløs lejekarakteristik. <span class='ref'>[s. 303]</span>"},{"d":"mid","q":"Trykket i oliefilmen beskrives af:","o":["Reynolds-ligningen","Eulers formel","Goodman","Hookes lov"],"a":0,"e":"Reynolds-ligningen giver filmens trykfordeling. <span class='ref'>[s. 303]</span>"},{"d":"mid","q":"Forskellen på hydrostatisk og hydrodynamisk lejer:","o":["Hydrostatisk pumper olie ind udefra","Hydrostatisk bruger ingen olie","De er identiske","Hydrostatisk kræver rotation"],"a":0,"e":"Hydrostatisk får tryk fra en pumpe → bærer ved stilstand. <span class='ref'>[s. 314]</span>"},{"d":"mid","q":"Hvad skaber det bærende tryk i et hydrodynamisk lejer?","o":["Den kileformede oliespalte","En pumpe","Magnetisme","Fjedre"],"a":0,"e":"Excentrisk aksel → kileformet spalte → trykopbygning. <span class='ref'>[s. 303]</span>"},{"d":"let","q":"Fladetrykket P i et lejer er:","o":["W/(L·d)","W·L·d","d/W","η·N"],"a":0,"e":"P = last/(projiceret areal) = W/(Ld). <span class='ref'>[s. 303]</span>"},{"d":"svaer","q":"Højere ηN/P giver:","o":["Tykkere film","Tyndere film","Ingen ændring","Metalkontakt"],"a":0,"e":"Mere viskositet/hastighed pr. tryk → tykkere adskillende film. <span class='ref'>[s. 303]</span>"},{"d":"mid","q":"Når et lejer bliver varmt, falder η, og filmen bliver:","o":["Tyndere","Tykkere","Uændret","Fast"],"a":0,"e":"Varme sænker viskositet → tyndere film → risiko for kontakt. <span class='ref'>[s. 314]</span>"},{"d":"let","q":"Et hydrostatisk lejer er godt fordi det:","o":["Bærer allerede ved opstart/stilstand","Ikke behøver olie","Kører uden pumpe","Aldrig bliver varmt"],"a":0,"e":"Trykolie pumpes ind → ingen metalkontakt ved lave hastigheder. <span class='ref'>[s. 314]</span>"},{"d":"mid","q":"Sommerfeld-tallet styrer bl.a.:","o":["Minimal filmtykkelse og friktion","Materialevalg","Farven","Vægten"],"a":0,"e":"S bestemmer excentricitet, filmtykkelse og tab. <span class='ref'>[s. 303]</span>"},{"d":"let","q":"<b>Petrovs ligning</b> (opkaldt efter N. Petrov) bruges til at beregne:","o":["Friktionsmomentet i et letbelastet, koncentrisk journallejer","Sommerfeld-tallet","Maksimalt oliefilmtryk","Lejerets forventede levetid"],"a":0,"e":"Petrovs ligning giver et estimat af friktionsmomentet, når journalet kører koncentrisk med lejet. <span class='ref'>[s. 314]</span>"},{"d":"mid","q":"Forskellen på et trykleje (thrust bearing) og et journallejer er:","o":["Trykleje-fladerne er vinkelrette på rotationsaksen, journallejer-fladerne er parallelle med den","Trykleje bruger ikke smøreolie","De to lejetyper har identisk geometri","Journallejer bærer kun aksial last"],"a":0,"e":"Trykleje bærer aksial last vinkelret på akslen, journallejer bærer radial last langs akslen. <span class='ref'>[s. 314]</span>"},{"d":"let","q":"Et journallejer, hvor smørefilmen dækker akslen hele vejen rundt (360°), kaldes:","o":["Et fuldt journallejer","Et partielt journallejer","Et trykleje","Et hydrostatisk leje"],"a":0,"e":"Wrap-vinkel på 360° = fuldt journallejer; mindre end 360° = partielt. <span class='ref'>[s. 314]</span>"},{"d":"mid","q":"Excentriciteten <b>e</b> i et journallejer er defineret som:","o":["Forskydningen af akseltappens centrum i forhold til lejets centrum","Det radiale spillerum mellem aksel og leje","Sommerfeld-tallet","Den totale oliefilmtykkelse"],"a":0,"e":"Ved last forskydes akslens centrum væk fra lejets centrum — denne forskydning er excentriciteten. <span class='ref'>[s. 315]</span>"},{"d":"mid","q":"Excentricitetsforholdet ε for et journallejer defineres som:","o":["ε = e/c","ε = c/e","ε = r/c","ε = h/e"],"a":0,"e":"ε er excentriciteten e divideret med det radiale spillerum c. <span class='ref'>[s. 315]</span>"},{"d":"svaer","q":"Den minimale filmtykkelse i et journallejer kan udtrykkes ved sammenhængen:","o":["h_min = c − e","h_min = c + e","h_min = c/e","h_min = e − c"],"a":0,"e":"Jo større excentricitet e, jo mindre bliver den mindste filmtykkelse. <span class='ref'>[s. 316]</span>"},{"d":"let","q":"Den <b>fysiske kile (wedge)</b>-mekanisme er:","o":["Den bedst kendte mekanisme til trykopbygning i glidelejer","Kun relevant i hydrostatiske lejer","Uden betydning for lejedesign","Det samme som squeeze-effekten"],"a":0,"e":"Den konvergerende kileformede spalte mellem flader er den vigtigste og mest kendte trykgenererende mekanisme. <span class='ref'>[s. 302]</span>"},{"d":"svaer","q":"Et glideleje med helt parallelle (ikke-hældende) flader kan:","o":["Ikke bære nogen last, da der ikke opbygges kileeffekt","Bære maksimal last uden problemer","Kun fungere som hydrostatisk leje","Kun fungere ved meget høje temperaturer"],"a":0,"e":"Uden konvergerende spalte opbygges der ingen trykprofil, så et parallelt-fladet leje kan ikke bære last. <span class='ref'>[s. 304]</span>"},{"d":"let","q":"Rullelejer (kapitel 13) betragtes i forhold til hydrodynamiske/hydrostatiske lejer som:","o":["Et konkurrerende maskinelement","En underkategori af hydrodynamiske lejer","Identisk teknologi","Udelukkende brugt i fly"],"a":0,"e":"Bogen nævner rullelejer som det konkurrerende alternativ til glidelejer. <span class='ref'>[s. 297]</span>"},{"d":"mid","q":"Den normale squeeze-term (ρ(w_a−w_b)) i Reynolds-ligningen har særlig betydning i:","o":["Hovedlejer til stempler i motorer og i kunstige led","Kun i turbinelejer","Kun i tandhjulsindgreb","Kun i kuglelejer"],"a":0,"e":"Squeeze-effekten giver en dæmpende, lastbærende virkning når flader presses mod hinanden, fx i motor-stempellejer og led. <span class='ref'>[s. 302]</span>"}];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{const p=it.o.map((t,idx)=>({t,c:idx===it.a}));shuffle(p);it.o=p.map(x=>x.t);it.a=p.findIndex(x=>x.c);});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let gr;
  if(ratio>=.85)gr='🏆 Fremragende!';else if(ratio>=.6)gr='👍 Godt gået';else if(ratio>=.35)gr='📚 Ikke dårligt';else gr='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${gr}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
