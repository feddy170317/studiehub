<!DOCTYPE html>
<html lang="da"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Kapitel 13</title>
<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}
</style></head><body><script src="../../assets/path-report.js"></script><script src="../../assets/quiz-result-ceremony.js"></script><div class="wrap">
  <header><h1>Kapitel 13 --- Rullelejer</h1><div class="sub">Fundamentals of Machine Elements (Hamrock) · Test dig selv</div></header>
  <div class="hud"><span>Spg. <b id="qnum">1</b>/<span id="qtot">10</span></span>
    <span class="combo">Combo ×<span id="combo">1</span></span>
    <span>Score <b id="score">0</b></span></div>
  <div class="bar"><div id="prog"></div></div>
  <div id="stage"></div></div>
<script>
const QUIZ_POOL = [{"d":"svaer","q":"L10-levetiden for et lejer er:","o":["L₁₀ = (C/P)^a","L₁₀ = C·P","L₁₀ = (P/C)^a","L₁₀ = C/P + a"],"a":0,"e":"L₁₀ = (C/P)^a, a=3 for kuglelejer. <span class='ref'>[s. 341]</span>"},{"d":"mid","q":"L10 betyder den levetid hvor:","o":["90% af lejerne stadig kører","Alle er svigtet","50% er svigtet","Lejet lige er indkørt"],"a":0,"e":"10% svigt-sandsynlighed = 90% overlever. <span class='ref'>[s. 341]</span>"},{"d":"mid","q":"Eksponenten a for <b>kuglelejer</b> er:","o":["3","10/3","2","1"],"a":0,"e":"a=3 for kugler, 10/3 for rullelejer. <span class='ref'>[s. 341]</span>"},{"d":"svaer","q":"Halveres lasten P, bliver kuglelejets levetid ca.:","o":["8× længere","2× længere","Halv","Uændret"],"a":0,"e":"(C/P)³ → (2)³ = 8× ved halv last. <span class='ref'>[s. 341]</span>"},{"d":"mid","q":"Kontakten mellem kugle og bane er et:","o":["Hertz-kontakt","Fladt kontakt","Hydrodynamisk lejer","Svejst samling"],"a":0,"e":"Punkt-/linjekontakt med høj lokal spænding (Hertz). <span class='ref'>[s. 346]</span>"},{"d":"let","q":"Dynamisk bæreevne C angives:","o":["I lejekataloget","Af brugeren","Som L10","I MPa"],"a":0,"e":"C er en katalogværdi for lejet. <span class='ref'>[s. 341]</span>"},{"d":"mid","q":"Rullelejer har sammenlignet med glidelejer:","o":["Lavere friktion ved opstart","Højere friktion","Ingen bæreevne","Brug for oliepumpe"],"a":0,"e":"Rullende kontakt → lav opstartsfriktion. <span class='ref'>[s. 336]</span>"},{"d":"mid","q":"Til ren <b>aksial</b> last vælges:","o":["Aksial-/vinkelkontaktlejer","Rillekuglelejer alene","Glidelejer","Ingen lejer"],"a":0,"e":"Aksiallast kræver leje designet til det. <span class='ref'>[s. 346]</span>"},{"d":"let","q":"Statisk bæreevne C₀ beskytter mod:","o":["Blivende mærker ved stilstand","Udmattelse i drift","Korrosion","Overophedning"],"a":0,"e":"C₀ mod plastiske mærker (brinelling) i ro. <span class='ref'>[s. 346]</span>"},{"d":"svaer","q":"C = 30 kN, P = 10 kN, kuglelejer. L10 er:","o":["27 mio. omdr.","3 mio. omdr.","9 mio. omdr.","30 mio. omdr."],"a":0,"e":"(30/10)³ = 27 mio. omdrejninger. <span class='ref'>[s. 341]</span>"},{"d":"let","q":"Et rulleleje består grundlæggende af:","o":["Indre ring, ydre ring, rulleelementer og et bur (cage)","Kun kugler og fedt","To glideflader og en oliefilm","En aksel og et hus"],"a":0,"e":"Rulleleje = samling af inner race, outer race, rulleelementer og en separator/cage. <span class='ref'>[s. 338]</span>"},{"d":"mid","q":"Et lejer uden bur, pakket med det maksimale antal rulleelementer, kaldes:","o":["Et full-complement lejer","Et Conrad-lejer","Et duplex-lejer","Et vinkelkontaktlejer"],"a":0,"e":"Uden cage kan flere kugler/ruller pakkes ind i annulus — det kaldes full-complement. <span class='ref'>[s. 338]</span>"},{"d":"mid","q":"Sammenlignet med et tilsvarende lejer med bur har et full-complement lejer:","o":["Højere bæreevne, men lavere hastighedsgrænse","Lavere bæreevne og lavere hastighed","Samme bæreevne og hastighed","Ingen praktisk forskel"],"a":0,"e":"Flere rulleelementer giver mere bæreevne, men mangel på cage begrænser den tilladte hastighed. <span class='ref'>[s. 338]</span>"},{"d":"let","q":"Et konisk rullelejer (tapered-roller bearing) består af en cup, en cone og:","o":["Koniske ruller og et bur","En glideflade og olie","To indre ringe","Et sæt kugler"],"a":0,"e":"Cup = ydre ring, cone = indre ring, plus koniske ruller og cage. <span class='ref'>[s. 338]</span>"},{"d":"svaer","q":"Et enkeltrækket, konisk rullelejer skal typisk monteres:","o":["Parvis, da det genererer en aksial reaktionskraft der skal optages af et andet lejer","Alene, da det er selvbærende i alle retninger","Altid sammen med et hydrodynamisk lejer","Kun i vandret position"],"a":0,"e":"Radial last på et konisk rullelejer skaber en thrust-reaktion, som skal optages af et andet lejer i parret. <span class='ref'>[s. 340]</span>"},{"d":"mid","q":"Et vinkelkontaktlejer (angular-contact ball bearing) kan pga. sin ene-skuldrede rille kun optage:","o":["Ensrettet (unidirektionel) aksiallast","Aksiallast i begge retninger","Ren radial last, aldrig aksial","Ubegrænset moment-last"],"a":0,"e":"To-skuldret rille i én ring og én-skuldret i den anden gør, at kun last i én aksial retning kan optages. <span class='ref'>[s. 338]</span>"},{"d":"let","q":"Nålelejer (needle bearings) er kendetegnet ved:","o":["Kompakthed i radial retning, ofte uden separat indre ring","Meget stor radial diameter","Kun brug ved meget lave hastigheder","Krav om ekstern oliepumpe"],"a":0,"e":"Nåle er tynde og lange; akslen er ofte selv hærdet/slebet og fungerer som indre ring. <span class='ref'>[s. 340]</span>"},{"d":"mid","q":"Pitch-diameteren d_e for et kugleleje beregnes som:","o":["d_e = (d_o + d_i)/2","d_e = d_o − d_i","d_e = d_o · d_i","d_e = 2(d_o + d_i)"],"a":0,"e":"Pitch-diameteren er gennemsnittet af den ydre og indre banes kontaktdiameter. <span class='ref'>[s. 341]</span>"},{"d":"svaer","q":"Raceformity-forholdet R_r = r/d for et kugleleje er ved perfekt konformitet lig:","o":["0,5","1,0","0,25","2,0"],"a":0,"e":"Ved perfekt konformitet er banens radius lig kuglens radius, så R_r = 1/2. <span class='ref'>[s. 341]</span>"},{"d":"mid","q":"Rullelejers primære konkurrerende maskinelement er ifølge kapitlet:","o":["Hydrodynamiske og hydrostatiske lejer (kapitel 12)","Tandhjul","Aksialkoblinger","Fjedre"],"a":0,"e":"Kapitlet peger direkte på glidelejerne fra kapitel 12 som konkurrenten. <span class='ref'>[s. 335]</span>"}];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{const p=it.o.map((t,idx)=>({t,c:idx===it.a}));shuffle(p);it.o=p.map(x=>x.t);it.a=p.findIndex(x=>x.c);});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let gr;
  if(ratio>=.85)gr='🏆 Fremragende!';else if(ratio>=.6)gr='👍 Godt gået';else if(ratio>=.35)gr='📚 Ikke dårligt';else gr='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${gr}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
