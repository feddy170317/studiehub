<title>Quiz — Kapitel 14</title>
<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}

<script>
const QUIZ_POOL = [{"d":"mid","q":"Modulet m for et tandhjul er:","o":["m = d/N","m = N/d","m = d·N","m = π·d"],"a":0,"e":"m = delecirkeldiameter/tandtal. <span class='ref'>[s. 381]</span>"},{"d":"mid","q":"To tandhjul kan kun gribe ind hvis de har samme:","o":["Modul","Diameter","Tandtal","Bredde"],"a":0,"e":"Samme modul = samme tandstørrelse. <span class='ref'>[s. 381]</span>"},{"d":"mid","q":"<b>Involuttprofilen</b> sikrer:","o":["Konstant udveksling","Lavere vægt","Ingen friktion","Højere modul"],"a":0,"e":"Involut giver jævn kraftoverføring langs indgrebslinjen. <span class='ref'>[s. 381]</span>"},{"d":"svaer","q":"Lewis-formlen for tandbøjning er:","o":["σ = W_t/(F·m·Y)","σ = W_t·F·m","σ = F/(W_t·Y)","σ = W_t/(m·Y²)"],"a":0,"e":"Tanden behandles som en bjælke: σ = W_t/(FmY). <span class='ref'>[s. 386]</span>"},{"d":"mid","q":"Udvekslingsforholdet i er:","o":["N₂/N₁","N₁·N₂","d₁·d₂","m₁/m₂"],"a":0,"e":"i = N₂/N₁ = ω₁/ω₂. <span class='ref'>[s. 381]</span>"},{"d":"mid","q":"De to hovedsvigtformer for tandhjul er:","o":["Tandbrud og pitting","Knækning og korrosion","Smeltning og slid","Kun brud"],"a":0,"e":"Bøjning (tandbrud) og fladetryk (pitting). <span class='ref'>[s. 386]</span>"},{"d":"let","q":"Et indgrebsforhold > 1 betyder:","o":["Altid mindst ét tandpar i indgreb","Kun ét tandpar nogensinde","Ingen kontakt","Højere friktion"],"a":0,"e":"Sikrer jævn, kontinuerlig drift. <span class='ref'>[s. 381]</span>"},{"d":"svaer","q":"d = 100 mm og N = 25 tænder. Modulet er:","o":["4 mm","0,25 mm","2500 mm","2 mm"],"a":0,"e":"m = d/N = 100/25 = 4 mm. <span class='ref'>[s. 381]</span>"},{"d":"mid","q":"Pitting (fladetryk) kontrolleres via:","o":["Hertz-kontaktspænding","Lewis-bøjning","Euler-knækning","Goodman"],"a":0,"e":"Overfladetrætning fra kontakttrykket. <span class='ref'>[s. 386]</span>"},{"d":"let","q":"AGMA-metoden tilføjer:","o":["Korrektionsfaktorer","Kun én formel","Materialevalg","Vægtberegning"],"a":0,"e":"Dynamik-, størrelses- og fordelingsfaktorer m.m. <span class='ref'>[s. 386]</span>"},{"d":"let","q":"Tandhjul inddeles i tre hovedklasser efter akse-geometri:","o":["Parallelakse-, ikke-parallelle koplanare og ikke-parallelle ikke-koplanare tandhjul","Lige, skrå og buede tandhjul","Store, mellemstore og små tandhjul","Stål-, messing- og plasttandhjul"],"a":0,"e":"Klassificeringen sker efter om akserne er parallelle, ikke-parallelle men koplanare, eller helt ude af plan. <span class='ref'>[s. 380]</span>"},{"d":"mid","q":"En ulempe ved skråtandede (helical) tandhjul ift. ligetandede tandhjul er, at de:","o":["Skaber en ekstra aksial skubkraft (end thrust) langs akslen","Ikke kan overføre høje momenter","Kræver et andet modul end ligetandede","Altid har lavere levetid"],"a":0,"e":"Den spiralformede tand giver et aksielt kraftbidrag, som kræver ekstra lejeunderstøtning. <span class='ref'>[s. 381]</span>"},{"d":"let","q":"Snekketandhjul (worm gears) bruges typisk til:","o":["Meget høje udvekslingsforhold, men med lav bæreevne og høj slitage","Lave udvekslingsforhold og høj bæreevne","Udelukkende parallelle aksler","Højhastighedsdrift uden slid"],"a":0,"e":"Snekkedrev giver store udvekslinger, men har lav bæreevne, højt kontakttryk og stort slid. <span class='ref'>[s. 381]</span>"},{"d":"mid","q":"Centerafstanden c_d mellem pinion og tandhjul beregnes som:","o":["c_d = (d_p + d_g)/2","c_d = d_p · d_g","c_d = d_p − d_g","c_d = 2(d_p + d_g)"],"a":0,"e":"Centerafstanden er gennemsnittet af pinionens og tandhjulets delecirkeldiameter. <span class='ref'>[s. 381]</span>"},{"d":"svaer","q":"Diametral pitch p_d er defineret som:","o":["Antal tænder pr. delecirkeldiameter (N/d)","Delecirkeldiameter pr. tand (d/N)","Afstanden mellem to tandtoppe","Vinklen mellem to nabotænder"],"a":0,"e":"Diametral pitch er (i US-enheder) antal tænder divideret med delecirkeldiameter — omvendt af modulet. <span class='ref'>[s. 383]</span>"},{"d":"mid","q":"Clearance c mellem addendum a og dedendum b er givet ved:","o":["c = b − a","c = a − b","c = a + b","c = a · b"],"a":0,"e":"Dedendum er større end addendum, og forskellen er clearance — nødvendig for at undgå bundkontakt. <span class='ref'>[s. 384]</span>"},{"d":"svaer","q":"Den fundamentale lov for tandhjulsindgreb (law of gearing) siger, at:","o":["Den fælles normal ved kontaktpunktet altid skal gå gennem et fast punkt (pitch point) for konstant udveksling","Tandhjulene altid skal have samme antal tænder","Modulet skal ændres under indgrebet","Kontaktpunktet altid skal ligge på grundcirklen"],"a":0,"e":"Kun ved denne betingelse holdes hastighedsforholdet konstant gennem hele indgrebet. <span class='ref'>[s. 386]</span>"},{"d":"mid","q":"Trykvinklen (pressure angle) φ er vinklen mellem:","o":["Centerlinjen (normalen på den) og indgrebslinjen","To modstående tandflanker","Aksen og modulet","Delecirklen og rodcirklen"],"a":0,"e":"φ ligger mellem linjen vinkelret på centerlinjen og selve indgrebslinjen (line of action). <span class='ref'>[s. 385]</span>"},{"d":"let","q":"Et godt indgrebsforhold for de fleste ligetandede tandhjulssæt ligger typisk i intervallet:","o":["1,4–2,0","0,1–0,5","5–10","10–20"],"a":0,"e":"Under 1,2 giver dårlig ydeevne; de fleste spur gear-sæt ligger på 1,4–2,0. <span class='ref'>[s. 387]</span>"},{"d":"mid","q":"Glidehastigheden mellem to tandflanker ved selve pitch point er:","o":["Nul — den stiger derefter mod begge ender af indgrebslinjen","Maksimal","Konstant langs hele indgrebslinjen","Negativ og aftagende"],"a":0,"e":"Ved pitch point er hastighederne ens (ren rulning), og glidningen vokser ud mod indgrebslinjens ender. <span class='ref'>[s. 387]</span>"}];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{const p=it.o.map((t,idx)=>({t,c:idx===it.a}));shuffle(p);it.o=p.map(x=>x.t);it.a=p.findIndex(x=>x.c);});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let gr;
  if(ratio>=.85)gr='🏆 Fremragende!';else if(ratio>=.6)gr='👍 Godt gået';else if(ratio>=.35)gr='📚 Ikke dårligt';else gr='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${gr}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
