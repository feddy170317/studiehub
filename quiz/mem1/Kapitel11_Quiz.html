<!DOCTYPE html>
<html lang="da"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Kapitel 11</title>
<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}
</style></head><body><script src="../../assets/path-report.js"></script><script src="../../assets/quiz-result-ceremony.js"></script><div class="wrap">
  <header><h1>Kapitel 11 --- Aksler og Tilhørende Dele</h1><div class="sub">Fundamentals of Machine Elements (Hamrock) · Test dig selv</div></header>
  <div class="hud"><span>Spg. <b id="qnum">1</b>/<span id="qtot">10</span></span>
    <span class="combo">Combo ×<span id="combo">1</span></span>
    <span>Score <b id="score">0</b></span></div>
  <div class="bar"><div id="prog"></div></div>
  <div id="stage"></div></div>
<script>
const QUIZ_POOL = [{"d":"mid","q":"En aksel dimensioneres typisk for:","o":["Kombineret bøjning og vridning","Kun træk","Kun tryk","Kun temperatur"],"a":0,"e":"Aksler bærer moment + bøjning samtidig. <span class='ref'>[s. 267]</span>"},{"d":"svaer","q":"Bøjningsspændingen i en massiv aksel er:","o":["σ = 32M/(πd³)","σ = 16M/(πd³)","σ = M/(πd³)","σ = 32M/(πd²)"],"a":0,"e":"σ = 32M/(πd³) for cirkulært tværsnit. <span class='ref'>[s. 267]</span>"},{"d":"svaer","q":"Vridningsspændingen i en massiv aksel er:","o":["τ = 16T/(πd³)","τ = 32T/(πd³)","τ = 16T/(πd²)","τ = T/(πd³)"],"a":0,"e":"τ = 16T/(πd³). <span class='ref'>[s. 267]</span>"},{"d":"mid","q":"Akselspændingen er proportional med:","o":["1/d³","1/d","d","d²"],"a":0,"e":"σ, τ ∝ 1/d³ → diameteren er meget effektiv. <span class='ref'>[s. 267]</span>"},{"d":"mid","q":"Ved en roterende aksel er bøjningsspændingen:","o":["Vekslende","Konstant","Nul","Kun tryk"],"a":0,"e":"Hvert punkt skifter mellem træk og tryk pr. omdrejning → udmattelse. <span class='ref'>[s. 267]</span>"},{"d":"svaer","q":"Ved det <b>kritiske omdrejningstal</b> sker:","o":["Resonans","Brud ved træk","Smeltning","Ingenting"],"a":0,"e":"Driftshastigheden rammer egenfrekvensen. <span class='ref'>[s. 285]</span>"},{"d":"mid","q":"En <b>kile</b> tjener til at:","o":["Overføre moment aksel–nav","Smøre lejet","Måle hastighed","Køle akslen"],"a":0,"e":"Kiler låser nav og aksel rotationsmæssigt. <span class='ref'>[s. 290]</span>"},{"d":"let","q":"En kilenot skaber:","o":["En spændingskoncentration","Højere styrke","Lavere vægt uden ulempe","Mindre moment"],"a":0,"e":"Noten er en kærv → medregnes i udmattelse. <span class='ref'>[s. 290]</span>"},{"d":"mid","q":"Driftshastigheden bør ligge:","o":["Væk fra det kritiske omdrejningstal","Præcis på det kritiske","Altid over 10000 rpm","På egenfrekvensen"],"a":0,"e":"Undgå resonans. <span class='ref'>[s. 285]</span>"},{"d":"let","q":"En blød overgangsradius ved et diameterspring:","o":["Mindsker kærvvirkning","Øger spændingen","Er ligegyldig","Sænker momentet"],"a":0,"e":"Større radius → lavere spændingskoncentration. <span class='ref'>[s. 267]</span>"},{"d":"let","q":"Aksel-design skal tage højde for:","o":["Både statisk og udmattelsessvigt","Kun statisk svigt","Kun udmattelsessvigt","Kun korrosion"],"a":0,"e":"Selvom udmattelse ofte er dimensionerende, skal statisk svigt (fx ved overbelastning) også tjekkes. <span class='ref'>[s. 264]</span>"},{"d":"mid","q":"Rayleigh-metoden til beregning af akslens kritiske hastighed:","o":["Overvurderer (giver en øvre grænse for) den kritiske hastighed","Undervurderer den kritiske hastighed","Giver altid den præcise værdi","Kan kun bruges til én masse"],"a":0,"e":"Rayleigh-ligningen giver en øvre grænse; Dunkerley-ligningen giver en nedre grænse. <span class='ref'>[s. 273]</span>"},{"d":"mid","q":"Dunkerley-ligningen for kritisk hastighed:","o":["Undervurderer (giver en nedre grænse for) den kritiske hastighed","Overvurderer den kritiske hastighed","Bruges kun til statisk analyse","Er identisk med Rayleigh-ligningen"],"a":0,"e":"1/ω_cr² = Σ1/ω_i² giver en nedre grænse for den faktiske kritiske hastighed. <span class='ref'>[s. 273]</span>"},{"d":"svaer","q":"Den kritiske (naturlige) frekvens for et enkelt-masse system på en aksel er:","o":["ω = √(k/m_a)","ω = k/m_a","ω = √(m_a/k)","ω = k·m_a"],"a":0,"e":"ω = √(k/m_a), hvor k er fjederraten og m_a massen. <span class='ref'>[s. 273]</span>"},{"d":"mid","q":"Aksler dimensioneres ofte med usædvanligt store sikkerhedsfaktorer, primært fordi:","o":["De er svære og dyre at udskifte (svært tilgængelige, mange dele monteret på dem)","Materialet altid er meget billigt","De aldrig udsættes for udmattelse","Standarder kræver det uanset anvendelse"],"a":0,"e":"Udskiftning kræver demontering af mange komponenter, hvilket giver høje omkostninger ved svigt. <span class='ref'>[s. 271]</span>"},{"d":"let","q":"En kile kan svigte på to måder:","o":["Forskydning (shear) eller fladetryk (bearing/compression)","Kun ved korrosion","Kun ved udmattelse i akslen","Kun ved varmeudvidelse"],"a":0,"e":"Design Procedure 11.2 tjekker både forskydningsspænding og fladetryk i kilen. <span class='ref'>[s. 275]</span>"},{"d":"svaer","q":"En vigtig funktion af kilen er at fungere som en sikkerhedsmekanisme, fordi:","o":["Kilen er billig og skal svigte (forskydes) før akslen eller dyre komponenter tager skade","Kilen altid er stærkere end akslen","Kilen forhindrer al vibration","Kilen erstatter behovet for lejer"],"a":0,"e":"Ved en drastisk overbelastning forskydes kilen først — den beskytter dyrere maskindele. <span class='ref'>[s. 275]</span>"},{"d":"mid","q":"En <b>Woodruff-kile</b> kendetegnes ved:","o":["Et konstant tværsnit med en halvcirkulær profil, der passer i et halvcirkulært spor","Et konisk tværsnit, der strammer ved indbankning","At den kun bruges til meget tunge, langsomme aksler","At den svejses fast til akslen"],"a":0,"e":"Woodruff-kilen er let-duty og selvcentrerende pga. den halvcirkulære sæde-form. <span class='ref'>[s. 275]</span>"},{"d":"let","q":"Rulle- eller rillede stifter (roll/grooved pins) holdes på plads af:","o":["Friktion fra elastisk deformation i hullet","Svejsning","Et gevind","Magnetisme"],"a":0,"e":"Stiften er lidt større end hullet; den elastiske tilbagefjedring skaber friktionskraft. <span class='ref'>[s. 275]</span>"},{"d":"let","q":"Forskydningsarealet A_s for en almindelig flad kile (bredde w, længde l) er:","o":["A_s = w·l","A_s = d·l","A_s = w·h","A_s = π·d·l"],"a":0,"e":"Forskydningen sker langs kilens bredde × længde-flade. <span class='ref'>[s. 275]</span>"}];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{const p=it.o.map((t,idx)=>({t,c:idx===it.a}));shuffle(p);it.o=p.map(x=>x.t);it.a=p.findIndex(x=>x.c);});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let gr;
  if(ratio>=.85)gr='🏆 Fremragende!';else if(ratio>=.6)gr='👍 Godt gået';else if(ratio>=.35)gr='📚 Ikke dårligt';else gr='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${gr}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
