<!DOCTYPE html>
<html lang="da"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Kapitel 18</title>
<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}
</style></head><body><script src="../../assets/path-report.js"></script><script src="../../assets/quiz-result-ceremony.js"></script><div class="wrap">
  <header><h1>Kapitel 18 --- Bremser og Koblinger</h1><div class="sub">Fundamentals of Machine Elements (Hamrock) · Test dig selv</div></header>
  <div class="hud"><span>Spg. <b id="qnum">1</b>/<span id="qtot">10</span></span>
    <span class="combo">Combo ×<span id="combo">1</span></span>
    <span>Score <b id="score">0</b></span></div>
  <div class="bar"><div id="prog"></div></div>
  <div id="stage"></div></div>
<script>
const QUIZ_POOL = [{"d":"mid","q":"Bremse-/koblingsmoment kan skrives:","o":["T = μ·F_N·r_eff","T = F_N/(μr)","T = μ/F_N","T = μ·r/F_N"],"a":0,"e":"Friktionskraft × radius = moment. <span class='ref'>[s. 522]</span>"},{"d":"let","q":"En bremse omsætter bevægelsesenergi til:","o":["Varme","Lys","Elektricitet","Lyd alene"],"a":0,"e":"Friktion → varme, som skal bortledes. <span class='ref'>[s. 532]</span>"},{"d":"mid","q":"En <b>kobling</b> tjener til at:","o":["Forbinde/afkoble to aksler","Bremse permanent","Måle moment","Smøre lejer"],"a":0,"e":"Overfører eller afbryder momentet mellem aksler. <span class='ref'>[s. 520]</span>"},{"d":"mid","q":"Flere friktionsflader (lameller) i en kobling giver:","o":["Større moment","Mindre moment","Ingen ændring","Lavere μ"],"a":0,"e":"Momentet skalerer med antal friktionsflader. <span class='ref'>[s. 522]</span>"},{"d":"mid","q":"En <b>båndbremse</b> er:","o":["Selvforstærkende i én retning","Symmetrisk begge veje","Uden friktion","Kun til koblinger"],"a":0,"e":"Rotationsretningen kan forstærke tilspændingen. <span class='ref'>[s. 525]</span>"},{"d":"let","q":"En skivebremse presser:","o":["En klods mod en skive","Et bånd om en tromle","To tandhjul sammen","En fjeder"],"a":0,"e":"Klods/kaliber mod roterende skive. <span class='ref'>[s. 525]</span>"},{"d":"svaer","q":"Bremsemomentet stiger hvis man:","o":["Øger μ, F_N eller radius","Sænker F_N","Sænker radius","Sænker μ"],"a":0,"e":"T = μF_N r → alle tre øger momentet. <span class='ref'>[s. 522]</span>"},{"d":"mid","q":"<b>Fading</b> af en bremse skyldes:","o":["Overophedning","For lav hastighed","For meget olie","For lidt last"],"a":0,"e":"Varme sænker μ → mistet bremseevne. <span class='ref'>[s. 532]</span>"},{"d":"let","q":"En bremse skal ud over moment dimensioneres for:","o":["Varmebortledning","Farve","Vægtbesparelse","Elektrisk ledning"],"a":0,"e":"Varmekapacitet afgør om den fader. <span class='ref'>[s. 532]</span>"},{"d":"svaer","q":"μ=0,3, F_N=1000 N, r=200 mm. Momentet er:","o":["60 Nm","600 Nm","6 Nm","0,6 Nm"],"a":0,"e":"T = 0,3·1000·0,2 m = 60 Nm. <span class='ref'>[s. 522]</span>"},{"d":"let","q":"En egenskab ved <b>thrust pad (disk)</b>-koblinger/bremser er, at de:","o":["Ikke kan selvspærre (self-lock)","Altid selvspærrer","Kun virker i vådt miljø","Har den laveste trykkapacitet"],"a":0,"e":"Disk-typen foretrækkes bl.a. til forakslen pga. overlegen konvektiv køling og fravær af selvspærring. <span class='ref'>[s. 522]</span>"},{"d":"let","q":"En konekobling giver højere tryk og moment end en thrust pad-kobling af samme størrelse pga.:","o":["Kilevirkningen af den koniske flade","Lavere friktionskoefficient","Mindre kontaktareal","Højere driftstemperatur"],"a":0,"e":"Keglens wedging action øger normalkraften for samme aktueringskraft. <span class='ref'>[s. 522]</span>"},{"d":"mid","q":"Halvkeglevinklen α i en konekobling holdes typisk over 4° for at:","o":["Undgå at koblingen sætter sig fast (jamming)","Øge friktionskoefficienten","Mindske koblingens vægt","Forbedre varmeafledningen"],"a":0,"e":"For lille vinkel risikerer at koblingen jammer; typisk værdi er 6-8°. <span class='ref'>[s. 525]</span>"},{"d":"mid","q":"I 'uniform wear'-modellen for en thrust disk-kobling er trykket p:","o":["Omvendt proportionalt med radius (p=c/r)","Konstant over hele skiven","Proportionalt med radius","Uafhængigt af slid"],"a":0,"e":"Da μAu skal være konstant for jævnt slid, følger p=c/r. <span class='ref'>[s. 523]</span>"},{"d":"svaer","q":"En bremse er <b>selvlåsende</b> (self-locking), hvis:","o":["Den krævede aktueringskraft W bliver nul ved et givet moment","Friktionskoefficienten er nul","Bremsen aldrig udvikler varme","Trykket er konstant over skoen"],"a":0,"e":"Selvlåsende geometrier undgås i praksis, da bremsen sætter sig fast eller griber ukontrolleret. <span class='ref'>[s. 527]</span>"},{"d":"let","q":"'Våde koblinger' (wet clutches) bruger væske til at:","o":["Hjælpe med afkøling","Øge friktionen markant","Forhindre slid helt","Reducere moment til nul"],"a":0,"e":"Ved høje effektniveauer bruges fluid til at bortlede den friktionsgenererede varme. <span class='ref'>[s. 522]</span>"},{"d":"mid","q":"Formålet med en <b>slip clutch</b> er at:","o":["Forhindre overbelastning ved at begrænse momentoverførslen","Øge det maksimale moment i systemet","Erstatte bremser permanent","Sænke driftstemperaturen"],"a":0,"e":"Bruges bl.a. i garageportsmotorer og kraner som anti-overload-beskyttelse; momentet er dog svært at kontrollere præcist. <span class='ref'>[s. 521]</span>"},{"d":"svaer","q":"'Glaserede belægningsflader' (glazed linings) på en bremse skyldes overophedning og resulterer i:","o":["Lavere friktion og forringet ydeevne","Højere friktion end normalt","Kun kosmetisk misfarvning","Ingen målbar effekt"],"a":0,"e":"Glasering sænker friktionskoefficienten; kan ofte fjernes med slibemiddel. <span class='ref'>[s. 521]</span>"},{"d":"let","q":"Tromlebremser (long-shoe) foretrækkes ofte til parkeringsbremse-funktion fordi de:","o":["Har en selvforstærkende (self-energizing) sko","Er lettere end skivebremser","Kræver ingen justering nogensinde","Har lavere friktion end skivebremser"],"a":0,"e":"Skivebremser har ikke selvforstærkende sko, hvorfor bilfabrikanter ofte bygger en tromle ind i bagskiven til parkering. <span class='ref'>[s. 528]</span>"},{"d":"svaer","q":"En short-shoe bremse med tromleradius r=350 mm skal levere T=225 Nm ved μ=0,30. Normalkraften P er ca.:","o":["2140 N","643 N","225 N","1071 N"],"a":0,"e":"P = T/(μr) = 225/(0,30·0,350) ≈ 2140 N. <span class='ref'>[s. 527]</span>"}];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{const p=it.o.map((t,idx)=>({t,c:idx===it.a}));shuffle(p);it.o=p.map(x=>x.t);it.a=p.findIndex(x=>x.c);});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let gr;
  if(ratio>=.85)gr='🏆 Fremragende!';else if(ratio>=.6)gr='👍 Godt gået';else if(ratio>=.35)gr='📚 Ikke dårligt';else gr='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${gr}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
