<!DOCTYPE html>
<html lang="da"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Kapitel 19</title>
<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}
</style></head><body><script src="../../assets/path-report.js"></script><script src="../../assets/quiz-result-ceremony.js"></script><div class="wrap">
  <header><h1>Kapitel 19 --- Plan Kinetik af et Stift Legeme: Impuls og Bevægelsesmængde</h1><div class="sub">Engineering Mechanics: Dynamics (Hibbeler) · Test dig selv</div></header>
  <div class="hud"><span>Spg. <b id="qnum">1</b>/<span id="qtot">10</span></span>
    <span class="combo">Combo ×<span id="combo">1</span></span>
    <span>Score <b id="score">0</b></span></div>
  <div class="bar"><div id="prog"></div></div>
  <div id="stage"></div></div>
<script>
const QUIZ_POOL = [{"d":"mid","q":"Impulsmomentet H_G for et stift legeme er:","o":["H_G = I_G·ω","H_G = m·v_G","H_G = ½I_Gω²","H_G = I_G·α"],"a":0,"e":"H_G = I_G ω. <span class='ref'>[s. 515]</span>"},{"d":"let","q":"Lineær bevægelsesmængde er:","o":["L = m·v_G","L = I_G·ω","L = ½mv²","L = F·t"],"a":0,"e":"L = m v_G. <span class='ref'>[s. 515]</span>"},{"d":"mid","q":"Vinkelimpuls-momentsætningen er:","o":["I_Gω₁ + ∫M dt = I_Gω₂","I_Gω₁ = I_Gω₂ altid","∫M dt = 0","I_Gα = 0"],"a":0,"e":"Momentimpuls ændrer impulsmomentet. <span class='ref'>[s. 521]</span>"},{"d":"mid","q":"Impulsmoment bevares når:","o":["Der ingen ydre momentimpuls er","Der er friktion","Energien bevares","ω = 0"],"a":0,"e":"Uden ydre moment → H konstant. <span class='ref'>[s. 536]</span>"},{"d":"svaer","q":"En skøjteløber trækker armene ind. Så:","o":["ω stiger","ω falder","H stiger","Energien er konstant"],"a":0,"e":"H = Iω bevaret → mindre I giver større ω. <span class='ref'>[s. 536]</span>"},{"d":"mid","q":"Et <b>excentrisk stød</b> er et stød hvor:","o":["Stødlinjen ikke går gennem massemidtpunktet","Der ingen rotation sker","e = 0 altid","Legemerne er punkter"],"a":0,"e":"Giver både translation og rotation. <span class='ref'>[s. 540]</span>"},{"d":"let","q":"Impuls-metoden er velegnet til:","o":["Stød og pludselige greb","Fart vs. position","Statik","Ren geometri"],"a":0,"e":"Kraft/moment over kort tid. <span class='ref'>[s. 521]</span>"},{"d":"mid","q":"H_G er rotationens svar til:","o":["Lineær bevægelsesmængde","Kinetisk energi","Arbejde","Effekt"],"a":0,"e":"H_G=I_Gω ↔ L=mv. <span class='ref'>[s. 515]</span>"},{"d":"svaer","q":"En skive I_G=2 kg·m², ω=5 rad/s. Impulsmoment:","o":["10 kg·m²/s","2,5 kg·m²/s","20 kg·m²/s","7 kg·m²/s"],"a":0,"e":"H_G = I_Gω = 2·5 = 10. <span class='ref'>[s. 515]</span>"},{"d":"mid","q":"Ved stød over kort tid kan man ofte se bort fra:","o":["Ikke-impulsive kræfter","Stødkraften","Bevægelsesmængden","Massen"],"a":0,"e":"Endelige kræfter giver forsvindende impuls i den korte stødtid. <span class='ref'>[s. 536]</span>"},{"d":"let","q":"Ved ren translation af et stift legeme (ω = 0) er impulsmomentet om massemidtpunktet H_G lig med:","o":["0","I_G·ω","m·v_G","I_G·α"],"a":0,"e":"Uden rotation er H_G = 0; kun L = mv_G er forskellig fra nul. <span class='ref'>[s. 518]</span>"},{"d":"mid","q":"For et legeme der roterer om en fast akse O er impulsmomentet om O:","o":["H_O = I_O·ω","H_O = I_G·ω","H_O = m·v_G·r_G","H_O = 0"],"a":0,"e":"H_O = I_Oω via parallelakse-sætningen. <span class='ref'>[s. 518]</span>"},{"d":"mid","q":"Impulsmomentet beregnet om det momentane rotationscenter (IC) kan skrives som:","o":["H_IC = I_IC·ω","H_IC = I_G·ω","H_IC = m·v_G","H_IC = 0"],"a":0,"e":"Analogt med H_O = I_Oω, men om IC. <span class='ref'>[s. 519]</span>"},{"d":"svaer","q":"Ved Charpy-slagprøven defineres <b>perkussionscentret</b> P (hvor pin-reaktionen bliver nul) ved:","o":["r_P = r̄ + k_G²/r̄","r_P = k_G²/r̄","r_P = r̄ − k_G²/r̄","r_P = r̄·k_G"],"a":0,"e":"Fundet ved at eliminere den impulsive pin-kraft. <span class='ref'>[s. 528]</span>"},{"d":"let","q":"Impuls-bevægelsesmængde-princippet kan anvendes på et helt system af forbundne legemer samtidig fordi:","o":["Interne impulser i samlingerne ophæver hinanden","Der ingen ydre kræfter er","Massen er den samme for alle dele","Rotation ikke tæller med"],"a":0,"e":"Interaktionsimpulser i samlinger er interne og kancellerer. <span class='ref'>[s. 522]</span>"},{"d":"mid","q":"Impuls-bevægelsesmængde-princippet for et legeme i planet skrives typisk som:","o":["3 skalarligninger (2 lineære + 1 angulær)","2 skalarligninger","6 skalarligninger","1 skalarligning"],"a":0,"e":"x-, y-retning plus moment om G. <span class='ref'>[s. 522]</span>"},{"d":"svaer","q":"En skive med I_O = 0,5 kg·m² starter i hvile. Et konstant moment på 4 N·m påføres i 3 sekunder. Hvad er ω₂?","o":["24 rad/s","12 rad/s","6 rad/s","1,5 rad/s"],"a":0,"e":"I_Oω₁ + M·t = I_Oω₂ → 0 + 4·3 = 0,5·ω₂ → ω₂ = 24 rad/s. <span class='ref'>[s. 521]</span>"},{"d":"mid","q":"Den angulære impuls-bevægelsesmængde-analyse bruges ofte til at eliminere ukendte impulsive kræfter, når disse:","o":["Er parallelle med eller går gennem den valgte akse","Er vinkelrette på aksen","Er tyngdekraften","Er nul i forvejen"],"a":0,"e":"Momentet af sådanne kræfter om aksen er da nul. <span class='ref'>[s. 523]</span>"},{"d":"let","q":"Impuls- og bevægelsesmængde-diagrammer (initial + impuls = final) bruges primært til at:","o":["Visualisere momentleddene i princippet","Beregne massen","Erstatte Newtons 2. lov","Undgå at bruge enheder"],"a":0,"e":"Grafisk hjælpemiddel til at se hvilke momenter der indgår. <span class='ref'>[s. 522]</span>"},{"d":"svaer","q":"En 4 kg tynd stang (I_G = (1/12)mL²) med længde 3 m roterer med ω = 2 rad/s om sit massecenter. Hvad er H_G?","o":["6 kg·m²/s","3 kg·m²/s","12 kg·m²/s","2 kg·m²/s"],"a":0,"e":"I_G = (1/12)(4)(3²) = 3 kg·m²; H_G = I_Gω = 3·2 = 6. <span class='ref'>[s. 515]</span>"}];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{const p=it.o.map((t,idx)=>({t,c:idx===it.a}));shuffle(p);it.o=p.map(x=>x.t);it.a=p.findIndex(x=>x.c);});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let gr;
  if(ratio>=.85)gr='🏆 Fremragende!';else if(ratio>=.6)gr='👍 Godt gået';else if(ratio>=.35)gr='📚 Ikke dårligt';else gr='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${gr}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
