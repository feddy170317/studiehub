<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}

  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}

<script>
const QUIZ_POOL = [{"d":"let","q":"Hastigheden af et punkt i afstand r fra rotationsaksen:","o":["v = ω·r","v = α·r","v = ω/r","v = ω²·r"],"a":0,"e":"v = ωr ved rotation om fast akse. <span class='ref'>[s. 332]</span>"},{"d":"mid","q":"Normalaccelerationen ved rotation er:","o":["a_n = ω²·r","a_n = α·r","a_n = ω·r","a_n = α²·r"],"a":0,"e":"a_n = ω²r, peger mod centrum. <span class='ref'>[s. 332]</span>"},{"d":"mid","q":"Tangentialaccelerationen er:","o":["a_t = α·r","a_t = ω²·r","a_t = ω·r","a_t = α²·r"],"a":0,"e":"a_t = αr (fra vinkelaccelerationen). <span class='ref'>[s. 332]</span>"},{"d":"svaer","q":"Relativ-hastighedsligningen er:","o":["v_B = v_A + ω×r_{B/A}","v_B = v_A·ω","v_B = ω×r_{B/A}","v_B = v_A − a_A"],"a":0,"e":"v_B = v_A + ω×r_{B/A}. <span class='ref'>[s. 356]</span>"},{"d":"mid","q":"Det <b>øjeblikkelige hastighedscenter</b> (IC) er punktet hvor:","o":["v = 0 momentant","a = 0","ω = 0","Kraften er nul"],"a":0,"e":"Legemet roterer momentant om IC. <span class='ref'>[s. 369]</span>"},{"d":"let","q":"ω og α gælder for:","o":["Hele det stive legeme","Kun ét punkt","Kun massemidtpunktet","Kun IC"],"a":0,"e":"Vinkelstørrelserne er fælles for hele legemet. <span class='ref'>[s. 332]</span>"},{"d":"mid","q":"Generel plan bevægelse er:","o":["Translation + rotation","Kun translation","Kun rotation","Ingen bevægelse"],"a":0,"e":"En kombination af begge. <span class='ref'>[s. 329]</span>"},{"d":"svaer","q":"Et hjul (r=0,3 m) ruller med ω=10 rad/s. Centerhastighed:","o":["3 m/s","30 m/s","0,03 m/s","10 m/s"],"a":0,"e":"v = ωr = 10·0,3 = 3 m/s. <span class='ref'>[s. 332]</span>"},{"d":"mid","q":"Ved et rullende hjul ligger IC:","o":["I kontaktpunktet med jorden","I centrum","I toppen","Udenfor hjulet"],"a":0,"e":"Kontaktpunktet har momentant v=0. <span class='ref'>[s. 369]</span>"},{"d":"svaer","q":"Ekstraleddet −ω²r_{B/A} i accelerationsligningen er:","o":["Normalkomponenten","Tangentialkomponenten","Coriolis","Nul"],"a":0,"e":"−ω²r peger fra B mod A (normal/centripetal). <span class='ref'>[s. 381]</span>"},{"d":"let","q":"I ligningen v_B = v_A + Ω×r_{B/A} + (v_{B/A})xyz for roterende akser betegner leddet (v_{B/A})xyz:","o":["Hastigheden af B relativt til A, målt af en observatør i det roterende system","Vinkelhastigheden af aksesystemet","Den absolutte hastighed af B","Coriolis-accelerationen"],"a":0,"e":"Det er den relative hastighed set fra det roterende xyz-system. <span class='ref'>[s. 397]</span>"},{"d":"mid","q":"Coriolis-accelerationen i accelerationsligningen for roterende akser er leddet:","o":["2Ω×(v_{B/A})xyz","Ω×r_{B/A}","ω²r","Ω×(Ω×r_{B/A})"],"a":0,"e":"Det ekstra led der opstår pga. kombinationen af relativ bevægelse og aksesystemets rotation. <span class='ref'>[s. 399]</span>"},{"d":"mid","q":"Coriolis-accelerationen står altid:","o":["Vinkelret på både Ω og (v_{B/A})xyz","Parallelt med r_{B/A}","I samme retning som v_A","Lig nul ved ren rotation"],"a":0,"e":"Krydsproduktet 2Ω×v giver pr. definition en vektor vinkelret på begge faktorer. <span class='ref'>[s. 399]</span>"},{"d":"svaer","q":"En stang roterer med Ω = 4 rad/s. En muffe glider udad langs stangen med en relativ hastighed på 3 m/s (vinkelret på Ω). Coriolis-accelerationens størrelse er:","o":["24 m/s²","12 m/s²","6 m/s²","48 m/s²"],"a":0,"e":"a_Cor = 2Ω·v_rel = 2·4·3 = 24 m/s². <span class='ref'>[s. 399]</span>"},{"d":"let","q":"Coriolis-accelerationen er især vigtig ved analyse af:","o":["Roterende referencesystemer (fx raketter, jordens rotation)","Ren translation","Statik","Stød"],"a":0,"e":"Nævnes eksplicit som relevant, når roterende rammer bruges til projektiler mv. <span class='ref'>[s. 399]</span>"},{"d":"let","q":"Ved analyse med roterende akser vælges den bevægelige xyz-ramme typisk til at være fastgjort til:","o":["Legemet eller anordningen, hvor den relative bevægelse foregår","Et fast punkt i rummet","Massemidtpunktet altid","Jordens overflade"],"a":0,"e":"Fx fastgøres xyz til stangen som en muffe glider på. <span class='ref'>[s. 400]</span>"},{"d":"mid","q":"Accelerationsligningen med roterende akser adskiller sig fra den tilsvarende ligning for en translerende ramme ved at have ekstra leddene:","o":["Coriolis-leddet og (a_{B/A})xyz","Kun a_A","Kun Ω̇×r_{B/A}","Der er ingen forskel"],"a":0,"e":"De to sidste led i eq. 16-29 er de nye bidrag fra aksesystemets rotation. <span class='ref'>[s. 399]</span>"},{"d":"svaer","q":"Hvis Ω og (v_{B/A})xyz er parallelle, bliver Coriolis-accelerationen:","o":["Nul (krydsprodukt af parallelle vektorer er nul)","Maksimal","Uendelig","Lig ω²r"],"a":0,"e":"Krydsproduktet af to parallelle vektorer er per definition nul. <span class='ref'>[s. 399]</span>"},{"d":"mid","q":"I ligningerne for roterende akser repræsenterer Ω:","o":["Vinkelhastigheden af det roterende xyz-referencesystem","Vinkelhastigheden af legemet altid","Den relative hastighed af B","Massen af systemet"],"a":0,"e":"Ω er aksesystemets egen rotation — ikke nødvendigvis identisk med et legemes ω. <span class='ref'>[s. 397]</span>"},{"d":"let","q":"Relativ-bevægelsesanalyse med roterende akser bruges typisk når:","o":["Et punkt glider langs et roterende legeme (fx en muffe på en roterende stang)","Der kun er ren translation","Hastigheden er konstant nul","To legemer er stift forbundne uden glid"],"a":0,"e":"Klassisk anvendelse: en muffe der glider udad på en roterende stang. <span class='ref'>[s. 401]</span>"}];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{const p=it.o.map((t,idx)=>({t,c:idx===it.a}));shuffle(p);it.o=p.map(x=>x.t);it.a=p.findIndex(x=>x.c);});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let gr;
  if(ratio>=.85)gr='🏆 Fremragende!';else if(ratio>=.6)gr='👍 Godt gået';else if(ratio>=.35)gr='📚 Ikke dårligt';else gr='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${gr}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
