<!DOCTYPE html>
<html lang="da"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Kapitel 12</title>
<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}
</style></head><body><script src="../../assets/path-report.js"></script><script src="../../assets/quiz-result-ceremony.js"></script><div class="wrap">
  <header><h1>⚡ Kapitel 12 — Kinematik af en Partikel</h1><div class="sub">Engineering Mechanics: Dynamics (Hibbeler) · Test dig selv</div></header>
  <div class="hud"><span>Spg. <b id="qnum">1</b>/<span id="qtot">10</span></span>
    <span class="combo">Combo ×<span id="combo">1</span></span>
    <span>Score <b id="score">0</b></span></div>
  <div class="bar"><div id="prog"></div></div>
  <div id="stage"></div></div>
<script>
const QUIZ_POOL = [{"d":"let","q":"Hvad beskriver <b>kinematik</b>?","o":["Bevægelse uden kræfter","Kun kræfter","Energi og arbejde","Materialers styrke"],"a":0,"e":"Ren bevægelsesbeskrivelse; kræfter = kinetik (kap. 13). <span class='ref'>[s. 23]</span>"},{"d":"let","q":"Sammenhæng mellem hastighed og position:","o":["v = ds/dt","v = s·t","v = a·s","v = dt/ds"],"a":0,"e":"v = ds/dt; a = dv/dt. <span class='ref'>[s. 25]</span>"},{"d":"mid","q":"Hvilken formel gælder <b>kun</b> ved konstant a?","o":["v² = v₀² + 2a_c·Δs","a·ds = v·dv","v = ds/dt","a = dv/dt"],"a":0,"e":"Konstant-a-ligningerne kræver a = konst. <span class='ref'>[s. 27]</span>"},{"d":"let","q":"Accelerationen ved frit fald er ca.:","o":["9,81 m/s² nedad","9,81 m/s² opad","0","1,0 m/s² nedad"],"a":0,"e":"g ≈ 9,81 m/s² nedad. <span class='ref'>[s. 28]</span>"},{"d":"mid","q":"På en <b>v–t-graf</b> aflæses accelerationen som:","o":["Hældningen","Arealet under kurven","Skæring med v-aksen","Toppunktet"],"a":0,"e":"Hældning v–t = a; areal = Δs. <span class='ref'>[s. 39]</span>"},{"d":"svaer","q":"I <b>projektilbevægelse</b> gælder for x-retningen:","o":["a_x = 0","a_x = −g","v_x = v₀−gt","a_x = v²/ρ"],"a":0,"e":"Vandret: ingen acceleration. <span class='ref'>[s. 59]</span>"},{"d":"svaer","q":"Normalaccelerationen (n–t) er:","o":["a_n = v²/ρ","a_n = v·dv/ds","a_n = dv/dt","a_n = ρ/v²"],"a":0,"e":"a_n = v²/ρ, peger indad. <span class='ref'>[s. 73]</span>"},{"d":"svaer","q":"Den radiale acceleration (polær) er:","o":["a_r = r̈ − rθ̇²","a_r = rθ̈ + 2ṙθ̇","a_r = ṙ","a_r = rθ̇"],"a":0,"e":"a_r = r̈ − rθ̇² (centripetalled). <span class='ref'>[s. 87]</span>"},{"d":"mid","q":"Klods A og B via snor over trisse. Hvis A går ned:","o":["v_A = −v_B","B står stille","B går dobbelt så hurtigt","a_A = 0"],"a":0,"e":"s_A + s_B = konst → v_A = −v_B. <span class='ref'>[s. 101]</span>"},{"d":"mid","q":"Relativ hastighed (translerende akse):","o":["v_B = v_A + v_{B/A}","v_B = v_A · v_{B/A}","v_B = v_A − a_{B/A}","v_{B/A} = v_A + v_B"],"a":0,"e":"Vektorligning v_B = v_A + v_{B/A}. <span class='ref'>[s. 113]</span>"},{"d":"let","q":"Hvordan defineres accelerationen i retlinet bevægelse?","o":["a = dv/dt","a = ds/dt","a = v/t","a = dv/ds"],"a":0,"e":"Acceleration er hastighedens tidsafledte. <span class='ref'>[s. 25]</span>"},{"d":"let","q":"Hvornår bruger man formlen <b>a·ds = v·dv</b>?","o":["Når accelerationen er en funktion af position, a=a(s)","Når accelerationen er konstant","Når hastigheden er konstant","Altid, uanset hvordan a afhænger af tiden"],"a":0,"e":"Denne form kobler a og s uden om tiden, ideel når a=a(s). <span class='ref'>[s. 25]</span>"},{"d":"mid","q":"Positionsformlen ved <b>konstant acceleration</b> a_c er:","o":["s = s₀ + v₀t + ½a_c t²","s = s₀ + v₀t","s = v₀t + a_c t²","s = ½a_c t²"],"a":0,"e":"Standardformlen for position under konstant a_c. <span class='ref'>[s. 27]</span>"},{"d":"let","q":"På en <b>a–t-graf</b> giver arealet under kurven:","o":["Δv (hastighedsændringen)","Δs (tilbagelagt strækning)","Hældningen af kurven","Startaccelerationen"],"a":0,"e":"Areal under a–t-kurve = hastighedsændring, ligesom areal under v–t giver Δs. <span class='ref'>[s. 39]</span>"},{"d":"mid","q":"De rektangulære komposanter af hastighedsvektoren skrives:","o":["v = ẋi + ẏj","v = xi + yj","v = ẍi + ÿj","v = v_x + v_y (skalarsum)"],"a":0,"e":"Hastighed er positionens tidsafledte i hver retning. <span class='ref'>[s. 52]</span>"},{"d":"mid","q":"I projektilbevægelse gælder i <b>lodret</b> retning (y):","o":["v_y = v₀y − gt","v_y = v₀y (konstant)","v_y = −gt²","v_y = v₀y + gt"],"a":0,"e":"Lodret bevægelse er jævnt accelereret med a_y=−g. <span class='ref'>[s. 59]</span>"},{"d":"svaer","q":"Tangentialaccelerationen a_t = v·dv/ds beskriver ændring af:","o":["Fartens (hastighedens) størrelse","Bevægelsens retning","Både størrelse og retning","Krumningsradius ρ"],"a":0,"e":"a_t ændrer kun farten; a_n ændrer retningen. <span class='ref'>[s. 73]</span>"},{"d":"mid","q":"Den samlede acceleration i (n,t)-koordinater findes som:","o":["a = √(a_t² + a_n²)","a = a_t + a_n","a = a_t · a_n","a = a_n − a_t"],"a":0,"e":"a_t og a_n er vinkelrette komposanter, kombineres med Pythagoras. <span class='ref'>[s. 73]</span>"},{"d":"svaer","q":"Den tværgående (transverse) hastighedskomposant i polære koordinater er:","o":["v_θ = rθ̇","v_θ = ṙ","v_θ = rθ̈","v_θ = θ̇"],"a":0,"e":"v_θ afhænger både af radius r og vinkelhastigheden θ̇. <span class='ref'>[s. 87]</span>"},{"d":"svaer","q":"I a_θ = rθ̈ + 2ṙθ̇ kaldes leddet <b>2ṙθ̇</b> for:","o":["Coriolis-accelerationen","Centripetalaccelerationen","Tangentialaccelerationen","Normalaccelerationen"],"a":0,"e":"Coriolis-leddet opstår når både r og θ ændrer sig samtidig. <span class='ref'>[s. 87]</span>"}];
// --- bland svarmulighedernes rækkefølge (position af korrekt svar randomiseres) ---
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{
  const packed = it.o.map((t,idx)=>({t, c: idx===it.a}));
  shuffle(packed);
  it.o = packed.map(p=>p.t);
  it.a = packed.findIndex(p=>p.c);
});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let g;
  if(ratio>=.85)g='🏆 Fremragende!';else if(ratio>=.6)g='👍 Godt gået';else if(ratio>=.35)g='📚 Ikke dårligt';else g='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${g}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
