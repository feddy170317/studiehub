<!DOCTYPE html>

<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}
</style></head><body><script src="../../assets/path-report.js"></script><script src="../../assets/quiz-result-ceremony.js"></script><div class="wrap">

  <div class="hud"><span>Spg. <b id="qnum">1</b>/<span id="qtot">10</span></span>

  <div id="stage"></div></div>
<script>
const QUIZ_POOL = [{"d":"let","q":"Kinetisk energi er:","o":["T = ½mv²","T = mv","T = ½mv","T = mgh"],"a":0,"e":"T = ½mv². <span class='ref'>[s. 200]</span>"},{"d":"mid","q":"Princippet om arbejde og energi er:","o":["T₁ + ΣU = T₂","T₁ = T₂","ΣU = 0","T₁·U = T₂"],"a":0,"e":"Nettoarbejdet ændrer den kinetiske energi. <span class='ref'>[s. 200]</span>"},{"d":"mid","q":"En kraft vinkelret på bevægelsen udfører:","o":["Intet arbejde","Maksimalt arbejde","Negativt arbejde","Uendeligt arbejde"],"a":0,"e":"U = F·d·cos90° = 0 (fx normalkraft). <span class='ref'>[s. 195]</span>"},{"d":"mid","q":"Effekt kan skrives som:","o":["P = F·v","P = F/v","P = F·a","P = m·v"],"a":0,"e":"P = F·v = dU/dt. <span class='ref'>[s. 219]</span>"},{"d":"svaer","q":"Energibevarelse (kun konservative kræfter) er:","o":["T₁+V₁ = T₂+V₂","T₁ = V₂","T₁+V₁ = 0","V₁ = V₂"],"a":0,"e":"Mekanisk energi bevares uden friktion. <span class='ref'>[s. 232]</span>"},{"d":"let","q":"Virkningsgraden ε er:","o":["P_ud/P_ind","P_ind/P_ud","P_ud·P_ind","P_ud−P_ind"],"a":0,"e":"ε = nyttig effekt / tilført effekt (< 1). <span class='ref'>[s. 219]</span>"},{"d":"svaer","q":"En genstand (2 kg) har v = 3 m/s. Kinetisk energi:","o":["9 J","6 J","18 J","3 J"],"a":0,"e":"T = ½·2·3² = 9 J. <span class='ref'>[s. 200]</span>"},{"d":"mid","q":"Arbejde-energi er nyttig fordi den er:","o":["En skalarmetode","Vektoriel og retningsafhængig","Kun til statik","Kun til rotation"],"a":0,"e":"Kobler fart og position direkte uden vektorer. <span class='ref'>[s. 200]</span>"},{"d":"mid","q":"Ved friktion i systemet bruger man:","o":["Arbejde-energi med friktionsarbejdet","Ren energibevarelse","Kun Newtons 2. lov","Impulsligningen"],"a":0,"e":"Friktion er ikke-konservativ → medregn dens arbejde. <span class='ref'>[s. 232]</span>"},{"d":"let","q":"Arbejdet af tyngdekraften ved fald Δy er:","o":["U = W·Δy","U = 0","U = −W·Δy nedad","U = W/Δy"],"a":0,"e":"Tyngden gør positivt arbejde når genstanden falder. <span class='ref'>[s. 195]</span>"},{"d":"let","q":"I kapitel 14 betegner symbolet <b>U</b>:","o":["Arbejde udført af en kraft","Kinetisk energi","Potentiel energi","Effekt"],"a":0,"e":"U = arbejde [J]; T = kinetisk energi; V = potentiel energi; P = effekt. <span class='ref'>[s. 195]</span>"},{"d":"mid","q":"Arbejdet udført af en fjeder ved forlængelse fra s₁ til s₂ er:","o":["U = −(½k s₂² − ½k s₁²)","U = ½k s²","U = k(s₂ − s₁)","U = ½k s₁² + ½k s₂²"],"a":0,"e":"Fjederarbejdet er differencen af de kvadratiske udtryk, med negativt fortegn. <span class='ref'>[s. 195]</span>"},{"d":"mid","q":"Gravitationel potentiel energi regnet fra et datum, med y positiv opad, er:","o":["V_g = W·y","V_g = W/y","V_g = ½W·y²","V_g = −W·y (altid negativ)"],"a":0,"e":"V_g = Wy; positiv over datum, negativ under."},{"d":"mid","q":"Elastisk potentiel energi V_e = ½k s² i en fjeder er:","o":["Altid positiv, uanset om fjederen strækkes eller trykkes","Negativ når fjederen sammentrykkes","Nul når fjederen sammentrykkes","Afhængig af strækningens retning (kan være negativ)"],"a":0,"e":"s indgår kvadratisk, så V_e er altid ≥ 0."},{"d":"svaer","q":"En kraft kaldes <b>konservativ</b>, hvis dens udførte arbejde:","o":["Er uafhængigt af vejen og kun afhænger af start- og slutposition","Afhænger af den tilbagelagte vejlængde","Altid er positivt","Er proportionalt med hastigheden"],"a":0,"e":"Tyngde og fjederkraft er konservative; friktion er det ikke. <span class='ref'>[s. 232]</span>"},{"d":"mid","q":"Friktionskraften er et eksempel på en kraft, der er:","o":["Ikke-konservativ — arbejdet afhænger af vejlængden og tabes som varme","Konservativ — arbejdet afhænger kun af start/slut","En kraft der aldrig udfører arbejde","Kun relevant for fjedersystemer"],"a":0,"e":"Jo længere vej, jo mere energi tabes til friktion; derfor gælder ren energibevarelse ikke. <span class='ref'>[s. 232]</span>"},{"d":"let","q":"Effekt P måles i hvilken SI-enhed?","o":["Watt (W)","Joule (J)","Newton (N)","m/s"],"a":0,"e":"1 W = 1 J/s. <span class='ref'>[s. 219]</span>"},{"d":"let","q":"Kapitel 14 dækker (ifølge overblikket) printed sider:","o":["195–250","129–194","251–300","1–50"],"a":0,"e":"129–194 er kapitel 13's sideinterval, ikke kapitel 14's. <span class='ref'>[s. 195]</span>"},{"d":"svaer","q":"En motor trækker en last med konstant kraft F=200 N ved hastigheden v=5 m/s. Effekten er:","o":["1000 W","40 W","1000 J","25 W"],"a":0,"e":"P = F·v = 200·5 = 1000 W. <span class='ref'>[s. 219]</span>"},{"d":"let","q":"Afsnit <b>14.3</b> i kapitlet omhandler:","o":["Arbejde og energi for et system af partikler","Effekt og virkningsgrad","Konservative kræfter og potentiel energi","Energibevarelse"],"a":0,"e":"14.3 udvider arbejde-energi-princippet fra én partikel til flere partikler."}];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{const p=it.o.map((t,idx)=>({t,c:idx===it.a}));shuffle(p);it.o=p.map(x=>x.t);it.a=p.findIndex(x=>x.c);});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let gr;
  if(ratio>=.85)gr='🏆 Fremragende!';else if(ratio>=.6)gr='👍 Godt gået';else if(ratio>=.35)gr='📚 Ikke dårligt';else gr='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${gr}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
