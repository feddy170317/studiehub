<!DOCTYPE html>
<html lang="da"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Kapitel 11</title>
<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}
</style></head><body><script src="../../assets/path-report.js"></script><script src="../../assets/quiz-result-ceremony.js"></script><div class="wrap">
  <header><h1>Kapitel 11 — Digitale Logiske Kredsløb</h1><div class="sub">Fundamentals of Electrical Engineering (Rizzoni) · Test dig selv</div></header>
  <div class="hud"><span>Spg. <b id="qnum">1</b>/<span id="qtot">10</span></span>
    <span class="combo">Combo ×<span id="combo">1</span></span>
    <span>Score <b id="score">0</b></span></div>
  <div class="bar"><div id="prog"></div></div>
  <div id="stage"></div></div>
<script>
const QUIZ_POOL = [{"d":"let","q":"Hvor mange kombinationer giver 4 bit?","o":["16","8","4","32"],"a":0,"e":"2⁴ = 16. <span class='ref'>[s. 552]</span>"},{"d":"mid","q":"De Morgan: NOT(A·B) er lig:","o":["Ā + B̄","Ā · B̄","A + B","Ā · B"],"a":0,"e":"NOT(A AND B) = Ā OR B̄. <span class='ref'>[s. 561]</span>"},{"d":"let","q":"En <b>AND</b>-port giver 1 når:","o":["Alle indgange er 1","Mindst én er 1","Alle er 0","Indgange forskellige"],"a":0,"e":"AND = 1 kun hvis alle er 1. <span class='ref'>[s. 561]</span>"},{"d":"mid","q":"Et <b>Karnaugh-diagram</b> bruges til at:","o":["Forenkle udtryk","Måle spænding","Tælle bits","Lagre data"],"a":0,"e":"Grupperer 1-taller til minimalt udtryk. <span class='ref'>[s. 573]</span>"},{"d":"svaer","q":"Sekventiel logik adskiller sig ved at:","o":["Have hukommelse","Være langsommere","Kun bruge AND","Ingen forskel"],"a":0,"e":"Afhænger også af tidligere tilstand. <span class='ref'>[s. 594]</span>"},{"d":"mid","q":"En <b>flip-flop</b> lagrer:","o":["1 bit","1 byte","Et helt tal","Ingenting"],"a":0,"e":"1 bit hukommelse. <span class='ref'>[s. 594]</span>"},{"d":"svaer","q":"Hvilke porte er <b>universelle</b>?","o":["NAND og NOR","AND og OR","XOR og NOT","Kun NOT"],"a":0,"e":"Alt kan bygges af NAND eller NOR. <span class='ref'>[s. 562]</span>"},{"d":"let","q":"En <b>XOR</b>-port giver 1 når indgangene er:","o":["Forskellige","Ens","Begge 1","Begge 0"],"a":0,"e":"Eksklusiv eller. <span class='ref'>[s. 561]</span>"},{"d":"mid","q":"En <b>multiplexer</b> er:","o":["Kombinatorisk","Sekventiel","En flip-flop","En tæller"],"a":0,"e":"Afhænger kun af aktuelle indgange. <span class='ref'>[s. 587]</span>"},{"d":"svaer","q":"Nabofelter i et K-diagram ændrer:","o":["Kun én variabel","To variable","Alle variable","Ingen variable"],"a":0,"e":"Gray-kode: én bit ad gangen. <span class='ref'>[s. 573]</span>"},{"d":"let","q":"En <b>OR</b>-port giver 1, når:","o":["Mindst én indgang er 1","Alle indgange er 1","Alle indgange er 0","Indgangene er forskellige"],"a":0,"e":"OR = 1, hvis mindst én indgang er sand. <span class='ref'>[s. 561]</span>"},{"d":"mid","q":"De Morgans lov giver, at NOT(A + B) er lig:","o":["Ā · B̄","Ā + B̄","A · B","A + B"],"a":0,"e":"NOT(A OR B) = Ā AND B̄ — den anden af De Morgans love. <span class='ref'>[s. 561]</span>"},{"d":"let","q":"Generelt giver <b>n bit</b>:","o":["2ⁿ kombinationer","n² kombinationer","2n kombinationer","n! kombinationer"],"a":0,"e":"Antal kombinationer vokser eksponentielt med antal bit. <span class='ref'>[s. 552]</span>"},{"d":"mid","q":"Tællere og registre bygges typisk af:","o":["Flip-flops styret af et clock-signal","Kun AND/OR-porte uden hukommelse","Kun kombinatorisk logik","Kun multiplexere"],"a":0,"e":"Clock-signalet synkroniserer, hvornår flip-floppene skifter tilstand. <span class='ref'>[s. 601]</span>"},{"d":"let","q":"En <b>dekoder</b> er et eksempel på:","o":["Kombinatorisk logik","Sekventiel logik","En flip-flop","En tæller"],"a":0,"e":"Udgangen afhænger kun af de aktuelle indgange, ingen hukommelse. <span class='ref'>[s. 594]</span>"},{"d":"let","q":"En <b>tæller</b> er et eksempel på:","o":["Sekventiel logik","Kombinatorisk logik","En simpel AND-port","Et Karnaugh-diagram"],"a":0,"e":"En tæller husker sin nuværende værdi mellem clock-pulserne. <span class='ref'>[s. 601]</span>"},{"d":"mid","q":"En <b>bit</b> kan antage værdierne:","o":["0 eller 1","0 til 9","A til F","Kun 1"],"a":0,"e":"Bit er den mindste digitale enhed med to mulige tilstande. <span class='ref'>[s. 550]</span>"},{"d":"svaer","q":"Kombinatorisk logik kendetegnes ved, at udgangen:","o":["Kun afhænger af de nuværende indgange (ingen hukommelse)","Afhænger af tidligere tilstande","Altid kræver et clock-signal","Ikke kan bygges af logiske porte"],"a":0,"e":"Modsat sekventiel logik har kombinatorisk logik ingen intern hukommelse. <span class='ref'>[s. 594]</span>"},{"d":"mid","q":"Kapitlets grundbegreber omfatter konvertering mellem tre talsystemer:","o":["Decimal, binær og hexadecimal","Decimal, binær og oktal","Kun binær og hexadecimal","Binær og romertal"],"a":0,"e":"Digital logik kræver, at man kan veksle mellem decimal, binær og hex. <span class='ref'>[s. 550]</span>"},{"d":"svaer","q":"SR, D og JK er typer af:","o":["Flip-flops","Logiske porte","Karnaugh-diagrammer","Talsystemer"],"a":0,"e":"De er de tre klassiske flip-flop-typer, hver med 1 bit hukommelse. <span class='ref'>[s. 594]</span>"}];
// --- bland svarmulighedernes rækkefølge (position af korrekt svar randomiseres) ---
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{
  const packed = it.o.map((t,idx)=>({t, c: idx===it.a}));
  shuffle(packed);
  it.o = packed.map(p=>p.t);
  it.a = packed.findIndex(p=>p.c);
});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let g;
  if(ratio>=.85)g='🏆 Fremragende!';else if(ratio>=.6)g='👍 Godt gået';else if(ratio>=.35)g='📚 Ikke dårligt';else g='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${g}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
