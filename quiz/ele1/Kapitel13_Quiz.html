<!DOCTYPE html>
<html lang="da"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Kapitel 13</title>
<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}
</style></head><body><script src="../../assets/path-report.js"></script><script src="../../assets/quiz-result-ceremony.js"></script><div class="wrap">
  <header><h1>Kapitel 13 — Introduktion til Elektriske Maskiner</h1><div class="sub">Fundamentals of Electrical Engineering (Rizzoni) · Test dig selv</div></header>
  <div class="hud"><span>Spg. <b id="qnum">1</b>/<span id="qtot">10</span></span>
    <span class="combo">Combo ×<span id="combo">1</span></span>
    <span>Score <b id="score">0</b></span></div>
  <div class="bar"><div id="prog"></div></div>
  <div id="stage"></div></div>
<script>
const QUIZ_POOL = [{"d":"let","q":"En elektrisk <b>motor</b> omsætter:","o":["El til mekanik","Mekanik til el","Varme til lys","El til varme"],"a":0,"e":"Motor: el→mekanik. <span class='ref'>[s. 690]</span>"},{"d":"mid","q":"Momentet i en DC-motor er:","o":["T = k·φ·I_a","T = k·φ·ω","T = E_b·ω","T = I_a/φ"],"a":0,"e":"T = kφI_a. <span class='ref'>[s. 703]</span>"},{"d":"mid","q":"Modspændingen (back-emf) er:","o":["E_b = k·φ·ω","E_b = k·φ·I_a","E_b = I_a·R","E_b = T·ω"],"a":0,"e":"E_b = kφω. <span class='ref'>[s. 703]</span>"},{"d":"svaer","q":"Synkron hastighed for en AC-maskine:","o":["n_s = 120f/p","n_s = 120p/f","n_s = fp/120","n_s = 60f/p"],"a":0,"e":"n_s = 120f/p (o/min). <span class='ref'>[s. 723]</span>"},{"d":"svaer","q":"Slippet i en induktionsmotor er:","o":["s = (n_s−n)/n_s","s = n/n_s","s = n_s−n","s = n_s/n"],"a":0,"e":"Relativ forskel fra synkron. <span class='ref'>[s. 731]</span>"},{"d":"mid","q":"En induktionsmotor kører normalt:","o":["Under synkron","Præcis synkron","Over synkron","Dobbelt hastighed"],"a":0,"e":"Slip > 0 kræves for moment. <span class='ref'>[s. 731]</span>"},{"d":"let","q":"Den faste del af maskinen kaldes:","o":["Stator","Rotor","Anker","Kommutator"],"a":0,"e":"Stator = fast, rotor = roterende. <span class='ref'>[s. 690]</span>"},{"d":"mid","q":"En <b>synkronmotor</b> kører ved:","o":["Synkron hastighed","Under synkron","Variabel","Nul"],"a":0,"e":"Låser til det roterende felt. <span class='ref'>[s. 727]</span>"},{"d":"svaer","q":"Ankerstrømmen i en DC-motor er:","o":["I_a = (V−E_b)/R_a","I_a = V·E_b","I_a = E_b/R_a","I_a = 0"],"a":0,"e":"E_b modvirker V; I_a=(V−E_b)/R_a. <span class='ref'>[s. 710]</span>"},{"d":"let","q":"Ved slip s = 0 har induktionsmotoren:","o":["Intet moment","Max moment","Højeste fart","Størst strøm"],"a":0,"e":"Ingen rotorstrøm → intet moment. <span class='ref'>[s. 731]</span>"},{"d":"let","q":"En elektrisk <b>generator</b> omsætter:","o":["Mekanik til el","El til mekanik","Varme til lys","El til varme"],"a":0,"e":"Generator: mekanik→el, det modsatte af motoren. <span class='ref'>[s. 690]</span>"},{"d":"let","q":"Den <b>roterende</b> del af en elektrisk maskine kaldes:","o":["Rotor","Stator","Kommutator alene","Viklingshus"],"a":0,"e":"Stator er fast, rotor roterer. <span class='ref'>[s. 690]</span>"},{"d":"mid","q":"Ifølge huskereglen er en motor og en generator:","o":["Samme maskine, blot i modsat energiretning","To helt forskellige maskintyper","Kun forbundet via en transformer","Uafhængige af hinanden"],"a":0,"e":"Samme fysiske opbygning — forskellen er, om energien går el→mekanik eller omvendt. <span class='ref'>[s. 690]</span>"},{"d":"mid","q":"Modspændingen E_b vokser med farten og har den funktion at:","o":["Begrænse ankerstrømmen I_a","Øge ankerstrømmen I_a","Sænke momentet til nul med det samme","Forhindre motoren i overhovedet at starte"],"a":0,"e":"I_a = (V−E_b)/R_a — når E_b vokser med farten, falder den drivende spændingsdifferens. <span class='ref'>[s. 703]</span>"},{"d":"let","q":"Momentets symbol <b>T</b> måles i enheden:","o":["Newtonmeter (Nm)","Watt (W)","Ampere (A)","Volt (V)"],"a":0,"e":"Moment (drejningsmoment) angives i Nm."},{"d":"let","q":"Ankerstrømmen <b>I_a</b> måles i enheden:","o":["Ampere (A)","Volt (V)","Newtonmeter (Nm)","Omdrejninger pr. minut"],"a":0,"e":"I_a er en strøm og angives derfor i ampere."},{"d":"mid","q":"Synkron hastighed <b>n_s</b> måles i enheden:","o":["Omdrejninger pr. minut (o/min)","Hertz (Hz)","Rad/s","Volt"],"a":0,"e":"n_s = 120f/p angives i o/min. <span class='ref'>[s. 723]</span>"},{"d":"svaer","q":"Hvorfor kan en induktionsmotor ikke køre ved præcis n_s?","o":["Fordi slippet s så ville være 0, og momentet ville forsvinde","Fordi det ville give uendeligt moment","Fordi statorviklingen ville brænde af","Fordi netfrekvensen ville blive negativ"],"a":0,"e":"Uden relativ hastighed mellem rotor og roterende felt induceres ingen rotorstrøm og dermed intet moment. <span class='ref'>[s. 731]</span>"},{"d":"mid","q":"En <b>alternator</b> er et eksempel på:","o":["En synkrongenerator","En induktionsmotor","En DC-motor","En transformer"],"a":0,"e":"Alternatoren er en synkronmaskine, der bruges som generator. <span class='ref'>[s. 723]</span>"},{"d":"svaer","q":"Hvis feltfluxen φ halveres, mens ankerstrømmen I_a holdes konstant, hvad sker der med momentet T?","o":["Momentet halveres også, da T = k·φ·I_a","Momentet fordobles","Momentet er uafhængigt af φ","Momentet bliver nul"],"a":0,"e":"T er direkte proportionalt med φ, så en halvering af φ giver en halvering af T. <span class='ref'>[s. 703]</span>"}];
// --- bland svarmulighedernes rækkefølge (position af korrekt svar randomiseres) ---
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{
  const packed = it.o.map((t,idx)=>({t, c: idx===it.a}));
  shuffle(packed);
  it.o = packed.map(p=>p.t);
  it.a = packed.findIndex(p=>p.c);
});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let g;
  if(ratio>=.85)g='🏆 Fremragende!';else if(ratio>=.6)g='👍 Godt gået';else if(ratio>=.35)g='📚 Ikke dårligt';else g='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${g}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
