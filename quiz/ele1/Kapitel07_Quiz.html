<!DOCTYPE html>
<html lang="da"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Kapitel 7</title>
<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}
</style></head><body><script src="../../assets/path-report.js"></script><script src="../../assets/quiz-result-ceremony.js"></script><div class="wrap">
  <header><h1>Kapitel 7 — Operationsforstærkere</h1><div class="sub">Fundamentals of Electrical Engineering (Rizzoni) · Test dig selv</div></header>
  <div class="hud"><span>Spg. <b id="qnum">1</b>/<span id="qtot">10</span></span>
    <span class="combo">Combo ×<span id="combo">1</span></span>
    <span>Score <b id="score">0</b></span></div>
  <div class="bar"><div id="prog"></div></div>
  <div id="stage"></div></div>
<script>
const QUIZ_POOL = [{"d":"let","q":"Indgangsstrømmen i en ideel op-amp er:","o":["Nul","Uendelig","Lig udgangsstrømmen","0,7 A"],"a":0,"e":"Uendelig indgangsmodstand → i=0. <span class='ref'>[s. 366]</span>"},{"d":"mid","q":"'Virtuel kortslutning' betyder:","o":["v₊ = v₋","v₊ = 0","Udgang kortsluttet","i₊ = ∞"],"a":0,"e":"Med negativ tilbagekobling: v₊ = v₋. <span class='ref'>[s. 367]</span>"},{"d":"mid","q":"Forstærkning af en <b>inverterende</b> kobling:","o":["−R_f/R_ind","1+R_f/R_ind","R_ind/R_f","−R_ind/R_f"],"a":0,"e":"v_ud = −(R_f/R_ind)v_ind. <span class='ref'>[s. 371]</span>"},{"d":"svaer","q":"Ikke-inverterende med R_f = R_ind giver:","o":["2","1","−1","0,5"],"a":0,"e":"(1+R_f/R_ind) = 2. <span class='ref'>[s. 373]</span>"},{"d":"let","q":"En stabil op-amp-forstærker kræver:","o":["Negativ tilbagekobling","Positiv tilbagekobling","Ingen tilbagekobling","En diode"],"a":0,"e":"Negativ tilbagekobling holder v₋=v₊. <span class='ref'>[s. 366]</span>"},{"d":"svaer","q":"Kondensator i tilbagekoblingen giver en:","o":["Integrator","Differentiator","Komparator","Ensretter"],"a":0,"e":"v_ud = −(1/RC)∫v_ind dt. <span class='ref'>[s. 403]</span>"},{"d":"mid","q":"<b>Slew rate</b> er:","o":["Max dv_ud/dt","Forstærkningen","Indgangsmodstanden","Offsetspændingen"],"a":0,"e":"Max ændringshastighed på udgangen. <span class='ref'>[s. 411]</span>"},{"d":"mid","q":"Udgangsspændingen er begrænset af:","o":["Forsyningsspændingen","Indgangsstrømmen","Kondensatoren","Frekvensen"],"a":0,"e":"Kan ikke overstige railerne → mætning. <span class='ref'>[s. 411]</span>"},{"d":"let","q":"Forstærkningen bestemmes af:","o":["Modstandsforholdet","Op-amp-typen","Forsyningen","Temperaturen"],"a":0,"e":"Forholdet R_f/R_ind. <span class='ref'>[s. 371]</span>"},{"d":"svaer","q":"En inverterende kobling analyseres med:","o":["Virtuel jord + KCL","Kun Ohms lov","Superposition","Thévenin på udgang"],"a":0,"e":"Sæt v₋=0 og opstil KCL. <span class='ref'>[s. 371]</span>"},{"d":"let","q":"Den ideelle op-amps <b>åben-sløjfe-forstærkning A</b> antages at være:","o":["Uendelig (A → ∞)","Nul","Lig 1","Lig forsyningsspændingen"],"a":0,"e":"Ideelt går A mod uendelig, hvilket muliggør de to gyldne regler under negativ tilbagekobling. <span class='ref'>[s. 366]</span>"},{"d":"let","q":"Udgangsmodstanden for en ideel op-amp antages at være:","o":["Nul","Uendelig","Lig R_f","Lig belastningen"],"a":0,"e":"Ideelt kan op-ampen levere spænding uden internt spændingsfald. <span class='ref'>[s. 366]</span>"},{"d":"mid","q":"Formlen for en <b>ikke-inverterende</b> forstærker er:","o":["v_ud = (1 + R_f/R_ind)·v_ind","v_ud = −(R_f/R_ind)·v_ind","v_ud = (R_ind/R_f)·v_ind","v_ud = R_f·v_ind"],"a":0,"e":"Ikke-inverterende gain er altid ≥ 1, i modsætning til den inverterende. <span class='ref'>[s. 371]</span>"},{"d":"mid","q":"En <b>inverterende</b> forstærkerkobling giver et faseskift på:","o":["180°","90°","0°","360°"],"a":0,"e":"Minusfortegnet i v_ud = −(R_f/R_ind)v_ind svarer til en 180° fasevending. <span class='ref'>[s. 371]</span>"},{"d":"svaer","q":"Formlen for en <b>differentiator</b> (C ved indgangen) er:","o":["v_ud = −RC·dv_ind/dt","v_ud = −(1/RC)∫v_ind dt","v_ud = RC·v_ind","v_ud = −(R_f/R_ind)v_ind"],"a":0,"e":"Differentiatoren giver udgang proportional med den afledte af indgangssignalet. <span class='ref'>[s. 403]</span>"},{"d":"mid","q":"En reel op-amp har et endeligt <b>gain-bandwidth-produkt (GBP)</b>, hvilket betyder:","o":["Forstærkningen falder, når frekvensen stiger","Forstærkningen er konstant ved alle frekvenser","Båndbredden er uendelig","GBP er uafhængigt af forstærkningen"],"a":0,"e":"I modsætning til den ideelle antagelse har en reel op-amp begrænset forstærkning-båndbredde. <span class='ref'>[s. 411]</span>"},{"d":"let","q":"Offsetspænding og indgangsstrømme (bias-strømme) i en reel op-amp er eksempler på:","o":["Reelle begrænsninger, som den ideelle model ignorerer","Ideelle egenskaber","Tilbagekoblingsparametre man selv vælger","Rene teoretiske størrelser uden praktisk betydning"],"a":0,"e":"Den ideelle op-amp-model ser bort fra disse ikke-idealiteter. <span class='ref'>[s. 411]</span>"},{"d":"let","q":"I forstærkningsformlerne henviser <b>R_ind</b> til:","o":["Modstanden i selve koblingen (det ydre kredsløb) ved indgangen","Op-ampens egen interne indgangsmodstand","Tilbagekoblingsmodstanden R_f","Belastningsmodstanden på udgangen"],"a":0,"e":"R_ind er den ydre modstand, kredsløbsdesigneren vælger — ikke op-ampens (uendelige) interne indgangsmodstand. <span class='ref'>[s. 366]</span>"},{"d":"mid","q":"Formlen for en <b>integrator</b> (C i tilbagekoblingen) er:","o":["v_ud = −(1/RC)∫v_ind dt","v_ud = −RC·dv_ind/dt","v_ud = (1+R_f/R_ind)v_ind","v_ud = RC·v_ind"],"a":0,"e":"Udgangen bliver det (skalerede, inverterede) integral af indgangssignalet. <span class='ref'>[s. 403]</span>"},{"d":"svaer","q":"I en inverterende kobling, hvor v₊ er forbundet til jord, betyder <b>virtuel jord</b> at:","o":["v₋ sættes til 0 V, selvom den ikke fysisk er jordet","v₋ er lig forsyningsspændingen","v₋ er lig udgangsspændingen","v₊ og v₋ begge er uendelige"],"a":0,"e":"Da v₊ = v₋ (gylden regel) og v₊ = 0 V (jordet), bliver v₋ = 0 V — deraf navnet virtuel jord. <span class='ref'>[s. 371]</span>"}];
// --- bland svarmulighedernes rækkefølge (position af korrekt svar randomiseres) ---
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{
  const packed = it.o.map((t,idx)=>({t, c: idx===it.a}));
  shuffle(packed);
  it.o = packed.map(p=>p.t);
  it.a = packed.findIndex(p=>p.c);
});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let g;
  if(ratio>=.85)g='🏆 Fremragende!';else if(ratio>=.6)g='👍 Godt gået';else if(ratio>=.35)g='📚 Ikke dårligt';else g='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${g}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
