<!DOCTYPE html>
<html lang="da"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Kapitel 8</title>
<style>
  :root{--bg:#0f1b2d;--card:#16263d;--acc:#2E86C1;--good:#2ecc71;--bad:#e74c3c;--txt:#e8eef5;--dim:#9fb3c8;--gold:#f1c40f}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#0f1b2d,#0a1220);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  header{text-align:center;margin-bottom:18px}
  h1{font-size:1.3rem;margin:.2em 0;color:#fff}
  .sub{color:var(--dim);font-size:.9rem}
  .hud{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:.9rem}
  .hud b{color:var(--gold);font-size:1.1rem}.combo{color:var(--acc)}
  .bar{height:6px;background:#0a1220;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>div{height:100%;background:var(--acc);width:0;transition:width .3s}
  .card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:20px;margin-bottom:10px;font-weight:600}
  .let{background:#1e4620;color:#8ef0a0}.mid{background:#4a3a17;color:#f4d47a}.svaer{background:#4a1e1e;color:#f4a0a0}
  .q{font-size:1.08rem;line-height:1.5;margin-bottom:16px}
  .opts{display:grid;gap:10px}
  .opt{background:#0f1e33;border:1.5px solid #26405f;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--txt);font-size:.98rem;transition:.15s}
  .opt:hover{border-color:var(--acc)}.opt.correct{border-color:var(--good);background:#123020}
  .opt.wrong{border-color:var(--bad);background:#301616}.opt:disabled{cursor:default}
  .exp{margin-top:16px;padding:12px 14px;border-radius:10px;background:#0f1e33;font-size:.9rem;line-height:1.5;display:none}
  .exp .ref{color:var(--gold);font-weight:600}
  .next{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;display:none}
  .end{text-align:center}.end .score{font-size:2.6rem;color:var(--gold);font-weight:700}
  .grade{font-size:1.3rem;margin:8px 0}
  .retry{margin-top:18px;padding:12px 26px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer;font-size:1rem}
</style></head><body><script src="../../assets/path-report.js"></script><script src="../../assets/quiz-result-ceremony.js"></script><div class="wrap">
  <header><h1>Kapitel 8 — Halvledere og Dioder</h1><div class="sub">Fundamentals of Electrical Engineering (Rizzoni) · Test dig selv</div></header>
  <div class="hud"><span>Spg. <b id="qnum">1</b>/<span id="qtot">10</span></span>
    <span class="combo">Combo ×<span id="combo">1</span></span>
    <span>Score <b id="score">0</b></span></div>
  <div class="bar"><div id="prog"></div></div>
  <div id="stage"></div></div>
<script>
const QUIZ_POOL = [{"d":"let","q":"En <b>n-type</b> halvleder har flest:","o":["Frie elektroner","Huller","Protoner","Neutroner"],"a":0,"e":"n-dotering → frie elektroner. <span class='ref'>[s. 440]</span>"},{"d":"let","q":"Spændingsfald over en ledende Si-diode:","o":["≈ 0,7 V","≈ 0 V","≈ 5 V","≈ 12 V"],"a":0,"e":"V_γ ≈ 0,6–0,7 V. <span class='ref'>[s. 445]</span>"},{"d":"mid","q":"En <b>baglæns</b> spændt diode:","o":["Sperrer","Leder fuldt","Kortslutter","Forstærker"],"a":0,"e":"Kun lille lækstrøm → afbrydelse. <span class='ref'>[s. 445]</span>"},{"d":"mid","q":"I den ideelle model er en ledende diode:","o":["En kortslutning","En afbrydelse","En 0,7 V kilde","En modstand"],"a":0,"e":"Ideel: kortslutning frem. <span class='ref'>[s. 445]</span>"},{"d":"svaer","q":"Diodens småsignalmodstand er:","o":["r_d = V_T/I_D","r_d = I_D/V_T","r_d = V_T·I_D","r_d = V_γ/I_D"],"a":0,"e":"r_d = V_T/I_D, V_T≈26 mV. <span class='ref'>[s. 450]</span>"},{"d":"mid","q":"En helbølge-<b>broensretter</b> bruger:","o":["4 dioder","1 diode","2 dioder","6 dioder"],"a":0,"e":"4 dioder, begge halvperioder. <span class='ref'>[s. 457]</span>"},{"d":"let","q":"En diodes hovedfunktion er:","o":["Strøm kun én vej","Forstærke signaler","Lagre ladning","Skabe modstand"],"a":0,"e":"Ensrettende ventil. <span class='ref'>[s. 445]</span>"},{"d":"mid","q":"En <b>udglatningskondensator</b>:","o":["Reducerer ripple","Øger frekvensen","Vender polariteten","Forstærker"],"a":0,"e":"Holder spændingen oppe → mindre ripple. <span class='ref'>[s. 458]</span>"},{"d":"svaer","q":"Termisk spænding V_T ved stuetemp.:","o":["26 mV","0,7 V","1 V","260 mV"],"a":0,"e":"V_T = kT/q ≈ 26 mV. <span class='ref'>[s. 450]</span>"},{"d":"let","q":"En <b>halvbølge</b>-ensretter leder i:","o":["Halve periode","Hele perioden","To perioder","Ingen del"],"a":0,"e":"Én diode → kun positive halvperiode. <span class='ref'>[s. 457]</span>"},{"d":"let","q":"En <b>p-type</b> halvleder har flest:","o":["Huller (positive bærere)","Frie elektroner","Protoner","Neutroner"],"a":0,"e":"p-dotering giver overskud af huller som ladningsbærere. <span class='ref'>[s. 440]</span>"},{"d":"mid","q":"En <b>pn-overgang</b> danner en diode med:","o":["En depletionszone (udtømningszone)","En fri elektronsky","En ren metalforbindelse","Uendelig ledningsevne"],"a":0,"e":"Depletionszonen opstår, hvor frie bærere gensidigt udtømmes ved overgangen. <span class='ref'>[s. 440]</span>"},{"d":"let","q":"En diode er <b>fremadspændt</b> (leder), når:","o":["v > V_γ","v < V_γ","v = 0","v er negativ"],"a":0,"e":"Kun når spændingen overstiger knæspændingen V_γ, begynder dioden at lede. <span class='ref'>[s. 445]</span>"},{"d":"mid","q":"Selv ved <b>baglæns</b> spænding løber der en lille strøm gennem dioden, kaldet:","o":["Lækstrøm","Fuld ledestrøm","Kortslutningsstrøm","Ripple-strøm"],"a":0,"e":"Dioden sperrer, men lukker stadig en lille lækstrøm igennem. <span class='ref'>[s. 445]</span>"},{"d":"mid","q":"I <b>konstant fald</b>-modellen antages spændingen over en ledende diode at være:","o":["Konstant 0,7 V, uanset strømmen","0 V, uanset strømmen","Proportional med strømmen (Ohms lov)","Uendelig"],"a":0,"e":"Denne model er en simpel forbedring af den ideelle model, hvor spændingsfaldet medregnes som fast. <span class='ref'>[s. 445]</span>"},{"d":"let","q":"En <b>halvbølge</b>-ensretter bruger:","o":["1 diode","2 dioder","4 dioder","6 dioder"],"a":0,"e":"Én diode leder kun i den ene halvperiode, resten spærres. <span class='ref'>[s. 457]</span>"},{"d":"svaer","q":"Den anbefalede fremgangsmåde ved diodeanalyse er at:","o":["Antage \"leder\" eller \"sperrer\", regne, og tjekke antagelsen bagefter","Altid antage, at dioden er lineær","Springe kontrollen af antagelsen over","Kun bruge r_d-modellen uanset situation"],"a":0,"e":"Man gætter en tilstand, regner kredsløbet, og verificerer at resultatet ikke modsiger antagelsen. <span class='ref'>[s. 445]</span>"},{"d":"mid","q":"I den <b>ideelle</b> diodemodel repræsenteres en sperret (baglæns spændt) diode som:","o":["En afbrydelse","En kortslutning","En 0,7 V kilde","En almindelig modstand"],"a":0,"e":"Ideel model: leder = kortslutning, sperrer = afbrydelse. <span class='ref'>[s. 445]</span>"},{"d":"let","q":"Diodens småsignalmodstand r_d = V_T/I_D afhænger af, ud over V_T, af:","o":["Diodestrømmen I_D","Kun forsyningsspændingen","Kun frekvensen","Kun temperaturen på kredsløbskortet"],"a":0,"e":"r_d falder, når arbejdspunktets strøm I_D stiger. <span class='ref'>[s. 450]</span>"},{"d":"svaer","q":"Sammenlignet med konstant fald-modellen og r_d-modellen er den <b>ideelle</b> diodemodel:","o":["Den simpleste, da den helt ignorerer spændingsfaldet over dioden","Den mest præcise for småsignalanalyse","Den eneste model, der medregner V_γ","Kun anvendelig ved baglæns spænding"],"a":0,"e":"Ideel model bruger kun kortslutning/afbrydelse — hverken 0,7 V-fald eller r_d indgår. <span class='ref'>[s. 445]</span>"}];
// --- bland svarmulighedernes rækkefølge (position af korrekt svar randomiseres) ---
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const QUIZ = shuffle(QUIZ_POOL.slice()).slice(0, Math.min(10, QUIZ_POOL.length));
QUIZ.forEach(it=>{
  const packed = it.o.map((t,idx)=>({t, c: idx===it.a}));
  shuffle(packed);
  it.o = packed.map(p=>p.t);
  it.a = packed.findIndex(p=>p.c);
});
const PTS={let:100,mid:150,svaer:200};
let i=0,score=0,combo=1,best=1;
const $=id=>document.getElementById(id);
$('qtot').textContent=QUIZ.length;
function render(){
  const it=QUIZ[i];$('qnum').textContent=i+1;$('prog').style.width=(i/QUIZ.length*100)+'%';
  const dn={let:'LET · 100p',mid:'MIDDEL · 150p',svaer:'SVÆR · 200p'}[it.d];
  let h=`<div class="card"><span class="tag ${it.d}">${dn}</span><div class="q">${it.q}</div><div class="opts">`;
  it.o.forEach((o,k)=>h+=`<button class="opt" onclick="answer(${k})">${o}</button>`);
  h+=`</div><div class="exp" id="exp">${it.e}</div><button class="next" id="next" onclick="next()">${i<QUIZ.length-1?'Næste →':'Se resultat →'}</button></div>`;
  $('stage').innerHTML=h;
}
function answer(k){
  const it=QUIZ[i];const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.disabled=true;if(j===it.a)b.classList.add('correct');});
  if(k===it.a){btns[k].classList.add('correct');score+=PTS[it.d]*combo;combo++;if(combo>best)best=combo;}
  else{btns[k].classList.add('wrong');combo=1;}
  $('score').textContent=score;$('combo').textContent=combo;
  $('exp').style.display='block';$('next').style.display='block';
}
function next(){i++;if(i<QUIZ.length)render();else end();}
function end(){
  $('prog').style.width='100%';
  const maxS=(function(){let s=0,c=1;for(const q of QUIZ){s+=PTS[q.d]*c;c++;}return s;})();
  const ratio=score/maxS;if(window.reportPathQuiz)reportPathQuiz(ratio,score);let g;
  if(ratio>=.85)g='🏆 Fremragende!';else if(ratio>=.6)g='👍 Godt gået';else if(ratio>=.35)g='📚 Ikke dårligt';else g='🔁 Læs kapitlet igen';
  $('stage').innerHTML=`<div class="card end"><div class="grade">${g}</div><div class="score">${score}</div><div class="sub">point · længste combo ×${best}</div><button class="retry" onclick="location.reload()">Prøv igen</button></div>`;if(window.renderPathResultBanner)document.getElementById('stage').insertAdjacentHTML('beforeend',renderPathResultBanner(ratio));
}
render();
</script></body></html>
