name = "studiehub"
main = "functions/index.js"
type = "service"
compatibility_date = "2024-01-01"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "studiehub"
database_id = "YOUR_DB_ID_HERE"

# Environment variables
[env.production]
vars = { ENVIRONMENT = "production" }
d1_databases = [
  { binding = "DB", database_name = "studiehub", database_id = "YOUR_PROD_DB_ID" }
]

[env.development]
vars = { ENVIRONMENT = "development" }
d1_databases = [
  { binding = "DB", database_name = "studiehub_dev", database_id = "YOUR_DEV_DB_ID" }
]

# This secret must be set via: wrangler secret put ADMIN_SECRET
# Development: use `wrangler secret put ADMIN_SECRET --env development`
# Production: use `wrangler secret put ADMIN_SECRET`
