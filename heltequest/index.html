<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HelteQuest ⚔️</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>⚔️</text></svg>">
<link rel="stylesheet" href="assets/fonts/fonts.css">
<link rel="stylesheet" href="assets/app.css">
</head>
<body>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="screen-login" class="login-screen">
  <div class="login-logo">⚔️</div>
  <h1 class="login-title">HelteQuest</h1>
  <p class="login-sub">Vælg din helt for at fortsætte eventyret</p>
  <div id="profiles" class="profiles">
    <div class="empty">Henter helte…</div>
  </div>
</div>

<div id="screen-pin" class="login-screen" style="display:none">
  <div id="pin-avatar" class="login-logo"></div>
  <h1 id="pin-name" class="login-title" style="font-size:2.2rem"></h1>
  <p class="login-sub">Tast din hemmelige kode</p>
  <div id="pin-pad"></div>
  <button id="pin-back" class="btn ghost small" style="margin-top:22px">← Tilbage</button>
</div>

<!-- ═══════════ HOVEDAPP ═══════════ -->
<div id="screen-app" style="display:none">
  <div class="wrap">

    <div class="card hero-bar">
      <button id="avatar-btn" class="avatar-ring" title="Skift avatar"></button>
      <div class="hero-meta">
        <div class="hero-name" id="hero-name"></div>
        <div class="hero-sub" id="hero-sub"></div>
        <div class="xp-bar"><div class="xp-fill" id="hero-xp-fill"></div></div>
        <div class="xp-label" id="hero-xp-label"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
        <span class="gold-pill">🪙 <span id="hero-gold">0</span></span>
        <span class="coin-pill" id="coin-pill" style="display:none">💠 <span id="hero-coin">0</span></span>
        <div style="display:flex;gap:6px">
          <button id="sound-btn" class="btn ghost small" style="padding:4px 8px;font-size:0.72rem">🔊</button>
          <button id="logout-btn" class="btn ghost small" style="padding:4px 10px;font-size:0.72rem">Log ud</button>
        </div>
      </div>
    </div>

    <!-- Side: Quests -->
    <div id="page-quests" class="page active">
      <div id="teaser-box"></div>
      <div id="streak-strip" class="streak-strip"></div>
      <h2 class="section-title">🗓️ Dagens quests <small id="today-label"></small></h2>
      <div id="daily-quests"></div>
      <h2 class="section-title">🌟 Ugens quests</h2>
      <div id="weekly-quests"></div>
      <div id="once-section" style="display:none">
        <h2 class="section-title">🎯 Særlige quests</h2>
        <div id="once-quests"></div>
      </div>
    </div>

    <!-- Side: Skills -->
    <div id="page-skills" class="page">
      <h2 class="section-title">🏆 Trofæ-væggen <small id="badge-count"></small></h2>
      <div class="card"><div id="badge-wall" class="badge-grid"></div></div>
      <h2 class="section-title">📈 Dine færdigheder</h2>
      <div id="skills-list"></div>
    </div>

    <!-- Side: Butik -->
    <div id="page-shop" class="page">
      <h2 class="section-title">🏪 Belønningsbutik</h2>
      <div id="shop-grid" class="shop-grid"></div>
      <h2 class="section-title">📦 Mine køb</h2>
      <div class="card" id="my-purchases"><div class="empty">Ingen køb endnu</div></div>
    </div>

    <!-- Side: Log -->
    <div id="page-log" class="page">
      <h2 class="section-title">📜 Eventyr-log</h2>
      <div class="card" id="adventure-log"><div class="empty">Din historie starter her…</div></div>
    </div>

  </div>

  <nav class="tabs">
    <button class="tab-btn active" data-page="quests"><span class="ico">⚔️</span>Quests</button>
    <button class="tab-btn" data-page="skills"><span class="ico">📈</span>Skills</button>
    <button class="tab-btn" data-page="shop"><span class="ico">🏪</span>Butik</button>
    <button class="tab-btn" data-page="log"><span class="ico">📜</span>Log</button>
  </nav>
</div>

<script src="assets/firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="assets/core.js"></script>
<script src="assets/player.js"></script>
</body>
</html>
