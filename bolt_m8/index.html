<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>M8 sekskantbolt — 3D CAD-model</title>
<style>
  :root{ --panel:rgba(16,21,32,.9); --line:#26324a; --txt:#eaf0fa; --muted:#8ea0bd; --acc:#f7c70a; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#0a0d13;color:var(--txt);
    font-family:"Segoe UI",system-ui,Arial,sans-serif;-webkit-user-select:none;user-select:none}
  #app{position:fixed;inset:0}
  canvas{display:block;touch-action:none}
  #title{position:fixed;left:14px;top:12px;z-index:10}
  #title h2{margin:0;font-size:15px;font-weight:800}
  #title p{margin:2px 0 0;font-size:11px;color:var(--muted)}
  .btns{position:fixed;right:12px;top:12px;z-index:10;display:flex;flex-direction:column;gap:7px}
  .btns button,.btns a{background:var(--panel);border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:9px 13px;font-size:12px;font-weight:600;cursor:pointer;
    text-decoration:none;text-align:center;backdrop-filter:blur(8px)}
  .btns button.on{background:var(--acc);color:#241f02;border-color:var(--acc)}
  .btns a.ghost{color:var(--muted);font-weight:500}
  #readout{position:fixed;left:14px;bottom:12px;z-index:10;font-size:11px;color:var(--muted);
    background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:7px 10px;line-height:1.5}
  #readout b{color:var(--txt)}
  #status{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;
    color:var(--muted);padding:30px;z-index:20;font-size:14px}
  @media (max-width:640px){ #readout{display:none} }
</style>
</head>
<body>
<div id="app"></div>
<div id="title"><h2>🔩 M8 <span style="color:var(--acc)">sekskantbolt</span></h2>
  <p>Den rigtige CAD-model (STEP → GLB) · stål</p></div>
<div class="btns">
  <button id="spin" class="on">🔄 Auto-roter</button>
  <a class="ghost" href="files/bolt.step" download>⬇ STEP</a>
  <a class="ghost" href="files/bolt.stl" download>⬇ STL</a>
</div>
<div id="readout">M8 · højde <b>100 mm</b> · gevind <b>5 mm</b> i tippen · stifthul <b>Ø1 mm</b> · masse <b>42,9 g</b></div>
<div id="status">Indlæser CAD-model…</div>

<script src="assets/vendor/three.min.js"></script>
<script src="assets/vendor/GLTFLoader.js"></script>
<script>
"use strict";
(function(){
  var st=document.getElementById('status');
  function fail(m){ st.style.display='flex'; st.innerHTML='⚠️ '+m; }
  if(!window.THREE){ fail("Kunne ikke indlæse Three.js."); return; }
  if(!THREE.GLTFLoader){ fail("Kunne ikke indlæse GLTFLoader."); return; }
  try{ boot(); }catch(e){ fail("Fejl: "+e.message); console.error(e); }

  function boot(){
    var app=document.getElementById('app'), W=app.clientWidth, H=app.clientHeight;
    var renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.setSize(W,H); renderer.shadowMap.enabled=true;
    renderer.shadowMap.type=THREE.PCFSoftShadowMap; renderer.setClearColor(0x0a0d13,1);
    renderer.outputEncoding=THREE.sRGBEncoding;
    renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.1;
    app.appendChild(renderer.domElement);

    var scene=new THREE.Scene(); scene.fog=new THREE.Fog(0x0a0d13,180,520);
    var camera=new THREE.PerspectiveCamera(40,W/H,0.1,2000);

    // env so steel shades correctly
    (function(){ var c=document.createElement('canvas'); c.width=16;c.height=128;
      var g=c.getContext('2d'); var gr=g.createLinearGradient(0,0,0,128);
      gr.addColorStop(0,'#cfe0f5'); gr.addColorStop(.5,'#7f93b3'); gr.addColorStop(1,'#10151f');
      g.fillStyle=gr; g.fillRect(0,0,16,128);
      var tex=new THREE.CanvasTexture(c); tex.mapping=THREE.EquirectangularReflectionMapping;
      var pm=new THREE.PMREMGenerator(renderer); scene.environment=pm.fromEquirectangular(tex).texture; tex.dispose();
    })();
    scene.add(new THREE.HemisphereLight(0xcfe0f5,0x1a2230,1.0));
    var key=new THREE.DirectionalLight(0xffffff,1.5); key.position.set(60,120,70);
    key.castShadow=true; key.shadow.mapSize.set(2048,2048);
    var sc=key.shadow.camera; sc.near=1; sc.far=600; sc.left=-80;sc.right=80;sc.top=120;sc.bottom=-40;
    scene.add(key);
    var rim=new THREE.DirectionalLight(0x55a0ff,0.4); rim.position.set(-70,50,-60); scene.add(rim);

    // orbit (custom)
    var camT=new THREE.Vector3(0,0,0), theta=0.7, phi=1.25, rad=160;
    function cam(){ phi=Math.max(0.15,Math.min(3.0,phi)); rad=Math.max(40,Math.min(700,rad));
      camera.position.set(camT.x+rad*Math.sin(phi)*Math.sin(theta), camT.y+rad*Math.cos(phi),
        camT.z+rad*Math.sin(phi)*Math.cos(theta)); camera.lookAt(camT); } cam();

    var floor=new THREE.Mesh(new THREE.CircleGeometry(400,64),
      new THREE.MeshStandardMaterial({color:0x131a26,roughness:.95,metalness:.1}));
    floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
    var grid=new THREE.GridHelper(800,40,0x2a3550,0x18202e);
    grid.material.opacity=.4; grid.material.transparent=true; scene.add(grid);

    // load the real model
    new THREE.GLTFLoader().load("bolt.glb", function(gltf){
      st.style.display='none';
      var model=gltf.scene;
      model.traverse(function(o){ if(o.isMesh){ o.castShadow=true; o.receiveShadow=true;
        if(o.material){ o.material.metalness=Math.min(0.7,(o.material.metalness||0)+0.5);
          o.material.roughness=Math.max(0.3,o.material.roughness||0.5);} } });
      // GLB from CAD is in metres (~0.05 m tall) -> scale to mm so numbers are sane
      var pre=new THREE.Box3().setFromObject(model), psz=new THREE.Vector3(); pre.getSize(psz);
      var k = psz.y>0 && psz.y<1 ? 1000 : 1;        // metres -> mm
      model.scale.setScalar(k); model.updateMatrixWorld(true);
      var box=new THREE.Box3().setFromObject(model), size=new THREE.Vector3(), ctr=new THREE.Vector3();
      box.getSize(size); box.getCenter(ctr);
      console.log("model size mm", size.x.toFixed(1), size.y.toFixed(1), size.z.toFixed(1));
      model.position.set(-ctr.x, -box.min.y, -ctr.z);   // feet on floor, centred
      scene.add(model);
      var h=size.y; camT.set(0,h*0.5,0); rad=h*2.4; cam();
      var sh=key.shadow.camera; var r=Math.max(size.x,size.z,h);
      sh.left=-r;sh.right=r;sh.top=r*1.6;sh.bottom=-r*0.4; key.shadow.camera.updateProjectionMatrix();
    }, undefined, function(err){
      fail("Kunne ikke hente bolt.glb.<br><small>Åbn den via det online link (GitHub Pages) — "+
           "lokale .glb blokeres ofte ved dobbeltklik (file://).</small>");
      console.error(err);
    });

    // interaction
    var down=false,lx=0,ly=0,el=renderer.domElement, spin=true;
    var spinBtn=document.getElementById('spin');
    spinBtn.onclick=function(){ spin=!spin; this.classList.toggle('on',spin); };
    el.addEventListener('pointerdown',function(e){ el.setPointerCapture(e.pointerId); down=true; spin=false;
      spinBtn.classList.remove('on'); lx=e.clientX; ly=e.clientY; });
    el.addEventListener('pointermove',function(e){ if(!down)return;
      theta-=(e.clientX-lx)*0.006; phi-=(e.clientY-ly)*0.006; lx=e.clientX; ly=e.clientY; cam(); });
    el.addEventListener('pointerup',function(){ down=false; });
    el.addEventListener('wheel',function(e){ e.preventDefault(); rad+=e.deltaY*0.0016*rad; cam(); },{passive:false});
    var pinch=0;
    el.addEventListener('touchmove',function(e){ if(e.touches.length===2){ e.preventDefault();
      var dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
      var d=Math.hypot(dx,dy); if(pinch){ rad+=(pinch-d)*0.5; cam(); } pinch=d; } },{passive:false});
    el.addEventListener('touchend',function(){ pinch=0; });
    window.addEventListener('resize',function(){ W=app.clientWidth;H=app.clientHeight;
      camera.aspect=W/H; camera.updateProjectionMatrix(); renderer.setSize(W,H); });

    (function tick(){ if(spin){ theta+=0.005; cam(); } renderer.render(scene,camera); requestAnimationFrame(tick); })();
  }
})();
</script>
</body>
</html>
